name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows-portable:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $packageVersion = node -p "require('./package.json').version"
          $tagVersion = '${{ github.ref_name }}' -replace '^v', ''
          if ($packageVersion -ne $tagVersion) {
            throw "Tag ${{ github.ref_name }} does not match package.json version $packageVersion"
          }

      - name: Install dependencies
        run: npm ci

      - name: Verify source
        run: |
          npm run check:deps
          npm test -- --maxWorkers=2 --testTimeout=30000 --hookTimeout=30000

      - name: Build and audit portable ZIP
        run: npm run build:win

      - name: Create or refresh draft GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $artifacts = @(Get-ChildItem -LiteralPath dist -Filter 'rp-terminal-*-windows-x64-portable.zip' -File)
          if ($artifacts.Count -ne 1) {
            throw "Expected exactly one portable ZIP, found $($artifacts.Count)"
          }

          $artifact = $artifacts[0]
          $checksumPath = "$($artifact.FullName).sha256"
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $artifact.FullName).Hash.ToLowerInvariant()
          Set-Content -LiteralPath $checksumPath -Encoding ascii -Value "$hash  $($artifact.Name)"

          $isDraft = gh release view '${{ github.ref_name }}' --json isDraft --jq '.isDraft' 2>$null
          if ($LASTEXITCODE -eq 0) {
            if ($isDraft -ne 'true') {
              throw 'Refusing to replace artifacts on an already-published release'
            }
            gh release upload '${{ github.ref_name }}' $artifact.FullName $checksumPath --clobber
          } else {
            gh release create '${{ github.ref_name }}' $artifact.FullName $checksumPath `
              --draft `
              --generate-notes `
              --title "RP Terminal ${{ github.ref_name }}" `
              --verify-tag
          }

  macos:
    needs: windows-portable
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            binary_arch: arm64
            runner: macos-15
          - arch: x64
            binary_arch: x86_64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and audit unsigned macOS ZIP
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          npm run build
          npx electron-builder --mac zip --${{ matrix.arch }} --publish never
          npm run check:release:mac

      - name: Verify architecture and unsigned label
        shell: bash
        run: |
          app_path="$(find dist -maxdepth 3 -type d -name 'RP Terminal.app' -print -quit)"
          if [[ -z "$app_path" ]]; then
            echo "::error::RP Terminal.app was not produced"
            exit 1
          fi

          actual_arch="$(lipo -archs "$app_path/Contents/MacOS/RP Terminal")"
          if [[ "$actual_arch" != "${{ matrix.binary_arch }}" ]]; then
            echo "::error::Expected ${{ matrix.binary_arch }} binary, found $actual_arch"
            exit 1
          fi

          if codesign --display --verbose=4 "$app_path" 2>&1 | grep -q 'Authority=Developer ID Application'; then
            echo "::error::Unsigned release unexpectedly contains a Developer ID signature"
            exit 1
          fi

      - name: Upload macOS artifacts to the draft GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(node -p "require('./package.json').version")"
          zip="rp-terminal-${version}-macos-${{ matrix.arch }}-unsigned.zip"

          (
            cd dist
            shasum -a 256 "$zip" > "$zip.sha256"
          )

          release_record="$(gh api 'repos/${{ github.repository }}/releases?per_page=100' \
            --jq '.[] | select(.tag_name == "${{ github.ref_name }}") | [.id, .draft] | @tsv')"
          release_count="$(printf '%s\n' "$release_record" | sed '/^$/d' | wc -l | tr -d ' ')"
          if [[ "$release_count" != "1" ]]; then
            echo "::error::Expected exactly one release for ${{ github.ref_name }}, found $release_count"
            exit 1
          fi

          IFS=$'\t' read -r release_id is_draft <<< "$release_record"
          if [[ "$is_draft" != "true" ]]; then
            echo "::error::Refusing to replace artifacts on an already-published release"
            exit 1
          fi

          for file in "dist/$zip" "dist/$zip.sha256"; do
            asset_name="$(basename "$file")"
            existing_asset_id="$(gh api 'repos/${{ github.repository }}/releases?per_page=100' \
              --jq ".[] | select(.tag_name == \"${{ github.ref_name }}\") | .assets[] | select(.name == \"$asset_name\") | .id")"
            if [[ -n "$existing_asset_id" ]]; then
              gh api --method DELETE "repos/${{ github.repository }}/releases/assets/$existing_asset_id"
            fi

            curl --fail --silent --show-error --retry 3 --retry-all-errors --retry-delay 2 \
              --request POST \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header 'Content-Type: application/octet-stream' \
              --data-binary "@$file" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/$release_id/assets?name=$asset_name" \
              > /dev/null
          done
