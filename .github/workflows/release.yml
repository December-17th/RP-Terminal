name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows-portable:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $packageVersion = node -p "require('./package.json').version"
          $tagVersion = '${{ github.ref_name }}' -replace '^v', ''
          if ($packageVersion -ne $tagVersion) {
            throw "Tag ${{ github.ref_name }} does not match package.json version $packageVersion"
          }

      - name: Install dependencies
        run: npm ci

      - name: Verify source
        run: |
          npm run check:deps
          npm test -- --maxWorkers=2

      - name: Build and audit portable ZIP
        run: npm run build:win

      - name: Create or refresh draft GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $artifacts = @(Get-ChildItem -LiteralPath dist -Filter 'rp-terminal-*-windows-x64-portable.zip' -File)
          if ($artifacts.Count -ne 1) {
            throw "Expected exactly one portable ZIP, found $($artifacts.Count)"
          }

          $artifact = $artifacts[0]
          $checksumPath = "$($artifact.FullName).sha256"
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $artifact.FullName).Hash.ToLowerInvariant()
          Set-Content -LiteralPath $checksumPath -Encoding ascii -Value "$hash  $($artifact.Name)"

          $isDraft = gh release view '${{ github.ref_name }}' --json isDraft --jq '.isDraft' 2>$null
          if ($LASTEXITCODE -eq 0) {
            if ($isDraft -ne 'true') {
              throw 'Refusing to replace artifacts on an already-published release'
            }
            gh release upload '${{ github.ref_name }}' $artifact.FullName $checksumPath --clobber
          } else {
            gh release create '${{ github.ref_name }}' $artifact.FullName $checksumPath `
              --draft `
              --generate-notes `
              --title "RP Terminal ${{ github.ref_name }}" `
              --verify-tag
          }

  macos:
    needs: windows-portable
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            binary_arch: arm64
            runner: macos-15
          - arch: x64
            binary_arch: x86_64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Require Apple signing and notarization credentials
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=0
          for name in MAC_CSC_LINK MAC_CSC_KEY_PASSWORD APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER APPLE_TEAM_ID; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required Actions secret: $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Install dependencies
        run: npm ci

      - name: Build, sign, notarize, and audit macOS artifacts
        shell: bash
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          npm run build
          npx electron-builder --mac dmg zip --${{ matrix.arch }}
          npm run check:release:mac

      - name: Notarize and staple the signed DMG container
        shell: bash
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          version="$(node -p "require('./package.json').version")"
          dmg="dist/rp-terminal-${version}-macos-${{ matrix.arch }}.dmg"
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          trap 'rm -f "$key_path"' EXIT
          printf '%s' "$APPLE_API_KEY" | /usr/bin/base64 -D > "$key_path"
          chmod 600 "$key_path"

          xcrun notarytool submit "$dmg" \
            --key "$key_path" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          xcrun stapler staple "$dmg"

      - name: Verify architecture, signature, notarization, and Gatekeeper acceptance
        shell: bash
        run: |
          app_path="$(find dist -maxdepth 3 -type d -name 'RP Terminal.app' -print -quit)"
          if [[ -z "$app_path" ]]; then
            echo "::error::RP Terminal.app was not produced"
            exit 1
          fi

          actual_arch="$(lipo -archs "$app_path/Contents/MacOS/RP Terminal")"
          if [[ "$actual_arch" != "${{ matrix.binary_arch }}" ]]; then
            echo "::error::Expected ${{ matrix.binary_arch }} binary, found $actual_arch"
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_path"
          spctl --assess --type execute --verbose=2 "$app_path"
          xcrun stapler validate "$app_path"
          version="$(node -p "require('./package.json').version")"
          dmg="dist/rp-terminal-${version}-macos-${{ matrix.arch }}.dmg"
          codesign --verify --verbose=2 "$dmg"
          xcrun stapler validate "$dmg"

      - name: Upload macOS artifacts to the draft GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(node -p "require('./package.json').version")"
          dmg="rp-terminal-${version}-macos-${{ matrix.arch }}.dmg"
          zip="rp-terminal-${version}-macos-${{ matrix.arch }}.zip"

          (
            cd dist
            shasum -a 256 "$dmg" > "$dmg.sha256"
            shasum -a 256 "$zip" > "$zip.sha256"
          )

          is_draft="$(gh release view '${{ github.ref_name }}' --json isDraft --jq '.isDraft')"
          if [[ "$is_draft" != "true" ]]; then
            echo "::error::Refusing to replace artifacts on an already-published release"
            exit 1
          fi

          gh release upload '${{ github.ref_name }}' \
            "dist/$dmg" "dist/$dmg.sha256" "dist/$zip" "dist/$zip.sha256" --clobber
