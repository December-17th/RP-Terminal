name: macOS Package Check

on:
  pull_request:
    paths:
      - '.github/workflows/macos-package-check.yml'
      - '.github/workflows/release.yml'
      - 'build/entitlements.mac.plist'
      - 'electron-builder.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/verify-package.mjs'
      - 'src/main/index.ts'
      - 'src/main/services/storageService.ts'
      - 'test/electronBuilderFiles.test.ts'
      - 'test/resolveDataBase.test.ts'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            binary_arch: arm64
            runner: macos-15
          - arch: x64
            binary_arch: x86_64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and audit unsigned macOS ZIP
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          npm run build
          npx electron-builder --mac zip --${{ matrix.arch }}
          npm run check:release:mac

      - name: Verify native architecture and unsigned status
        run: |
          app_path="$(find dist -maxdepth 3 -type d -name 'RP Terminal.app' -print -quit)"
          test "$(lipo -archs "$app_path/Contents/MacOS/RP Terminal")" = '${{ matrix.binary_arch }}'
          if codesign --display --verbose=4 "$app_path" 2>&1 | grep -q 'Authority=Developer ID Application'; then
            echo "::error::Unsigned package unexpectedly contains a Developer ID signature"
            exit 1
          fi
