<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Electron</title>
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <!-- `script-src` allows 'unsafe-inline' because sandboxed plugin/card-script
         iframes (srcdoc) inherit this policy and need to run their injected shim +
         scripts. This does NOT loosen the untrusted-HTML path: B1's card-HTML iframe
         is sandboxed WITHOUT allow-scripts (so scripts never run there), and the top
         frame never injects untrusted inline scripts. The plugin iframes' own meta
         CSP (connect-src 'none') still closes their network.
         `'wasm-unsafe-eval'` lets the shared ST-Prompt-Template engine compile its
         quickjs WASM sandbox at render-time (Phase C). It permits WebAssembly ONLY —
         not JS eval/new Function (that would be the broader 'unsafe-eval').
         `https:` is allowed in script/style/font/connect so INLINE trusted cards
         (InlineCardFrame: a same-origin srcdoc that INHERITS this policy — a child
         <meta> can only tighten it) can load their own ESM modules, stylesheets, and
         fonts from ANY CDN, at parity with the Isolated (WCV) path's CSP
         (wcvManager.CARD_CSP / WcvMessageFrame). Inline cards already run trusted
         (allow-scripts allow-same-origin), so this matches their trust level. We keep
         `'wasm-unsafe-eval'` rather than the broader `'unsafe-eval'` — no card has
         needed JS eval. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' blob: https:; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:; img-src 'self' data: blob: https:; connect-src 'self' data: blob: https:; media-src 'self' data: blob: https:"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
