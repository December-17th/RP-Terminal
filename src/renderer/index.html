<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Electron</title>
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <!-- `script-src` allows 'unsafe-inline' because sandboxed plugin/card-script
         iframes (srcdoc) inherit this policy and need to run their injected shim +
         scripts. This does NOT loosen the untrusted-HTML path: B1's card-HTML iframe
         is sandboxed WITHOUT allow-scripts (so scripts never run there), and the top
         frame never injects untrusted inline scripts. The plugin iframes' own meta
         CSP (connect-src 'none') still closes their network.
         `'wasm-unsafe-eval'` lets the shared ST-Prompt-Template engine compile its
         quickjs WASM sandbox at render-time (Phase C). It permits WebAssembly ONLY —
         not JS eval/new Function (that would be the broader 'unsafe-eval').
         `https:` is allowed in script/style/font/connect so INLINE trusted cards
         (InlineCardFrame: a same-origin srcdoc that INHERITS this policy — a child
         <meta> can only tighten it) can load their own ESM modules, stylesheets, and
         fonts from ANY CDN, at parity with the Isolated (WCV) path's CSP
         (wcvManager.CARD_CSP / WcvMessageFrame). Inline cards already run trusted
         (allow-scripts allow-same-origin), so this matches their trust level. We keep
         `'wasm-unsafe-eval'` rather than the broader `'unsafe-eval'` — no card has
         needed JS eval.
         `data:` is allowed in `script-src` because the card-script runtime resolves a
         script's remote ES-module imports by host-fetching the graph and rewriting them to
         self-contained `data:` URLs (the opaque srcdoc frame can't import cross-origin, and
         blob:null modules can't be imported there either). Those srcdoc frames INHERIT this
         policy (a child <meta> can only tighten it), so `data:` must be allowed here or the
         modules are blocked.
         `rptasset:` is allowed in `img-src` so World-Asset portraits load in the top frame
         (the Asset Manager view) AND in the inline card srcdoc frame — because that srcdoc
         INHERITS this policy, the card iframe's own `rptasset:` in csp.ts is void unless it's
         also allowed here. (WCV cards run in a separate session with img-src *, so they're
         unaffected.) -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' data: blob: https:; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:; img-src 'self' data: blob: rptasset: https:; connect-src 'self' data: blob: https:; media-src 'self' data: blob: https:"
    />
    <!-- Noto Sans SC (Simplified Chinese) for the app UI. Latin stays Inter via the
         font-family stacks in index.css; this supplies the CJK glyphs so 中文 renders in
         Noto Sans SC everywhere (chrome + message prose). Loaded from Google Fonts over the
         CSP-allowed https: origins; offline it falls back to the system CJK font (e.g. 微软雅黑). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800;900&display=swap"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
