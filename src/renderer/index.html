<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Electron</title>
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <!-- `script-src` allows 'unsafe-inline' because sandboxed plugin/card-script
         iframes (srcdoc) inherit this policy and need to run their injected shim +
         scripts. This does NOT loosen the untrusted-HTML path: B1's card-HTML iframe
         is sandboxed WITHOUT allow-scripts (so scripts never run there), and the top
         frame never injects untrusted inline scripts. The plugin iframes' own meta
         CSP (connect-src 'none') still closes their network.
         `'wasm-unsafe-eval'` lets the shared ST-Prompt-Template engine compile its
         quickjs WASM sandbox at render-time (Phase C). It permits WebAssembly ONLY —
         not JS eval/new Function (that would be the broader 'unsafe-eval').
         Trusted card CDN hosts are allowed in script/style/font/connect to support
         inline card ESM + font loading (Phase A). -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' blob: https://cdn.jsdelivr.net https://fastly.jsdelivr.net https://unpkg.com https://esm.sh https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fastly.jsdelivr.net https://unpkg.com https://esm.sh https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: blob: https:; connect-src 'self' data: blob: https://cdn.jsdelivr.net https://fastly.jsdelivr.net https://unpkg.com https://esm.sh https://cdnjs.cloudflare.com; media-src 'self' data: blob: https:"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
