appId: com.december17th.rpterminal
productName: RP Terminal
directories:
  buildResources: build
# Positive allowlist ONLY. Do NOT switch this back to an exclusion-only
# (all-`!`) list: electron-builder treats a files list that contains only
# ignore patterns as empty and injects `**/*`, which packages the entire repo
# (rp-terminal-data, .claude, .scratch, docs, src, ...). Production node_modules
# for deps declared in package.json are added automatically by a separate
# walker, so they don't need to be listed here. Verified by scripts/verify-package.mjs.
files:
  - 'out/**'
  - 'package.json'
  - 'resources/**'
asarUnpack:
  - resources/**
win:
  executableName: RP Terminal
  icon: build/rp-terminal.ico
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
