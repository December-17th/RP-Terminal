appId: com.december17th.rpterminal
productName: RP Terminal
directories:
  buildResources: build
# Positive allowlist ONLY. Do NOT switch this back to an exclusion-only
# (all-`!`) list: electron-builder treats a files list that contains only
# ignore patterns as empty and injects `**/*`, which packages the entire repo
# (rp-terminal-data, .claude, .scratch, docs, src, ...). Production node_modules
# for runtime deps declared in package.json are added automatically by a
# separate walker, so they don't need to be listed here. Renderer-only build
# dependencies stay in devDependencies so they are not copied a second time.
# Verified by scripts/verify-package.mjs.
files:
  - 'out/**'
  - 'package.json'
  - 'resources/icons/rp-terminal-emerald.png'
  # better-sqlite3 runs from lib/ + its rebuilt native binding. Its C/C++ build
  # inputs are not needed after packaging and smart-unpack would otherwise copy
  # them beside the app.
  - '!node_modules/better-sqlite3/deps/**'
  - '!node_modules/better-sqlite3/src/**'
  - '!node_modules/better-sqlite3/binding.gyp'
asarUnpack:
  - resources/icons/rp-terminal-emerald.png
win:
  executableName: RP Terminal
  icon: build/rp-terminal.ico
  electronLanguages:
    - en-US
    - zh-CN
  target:
    - target: zip
      arch:
        - x64
  artifactName: ${name}-${version}-windows-${arch}-portable.${ext}
mac:
  category: public.app-category.entertainment
  target:
    - zip
  artifactName: ${name}-${version}-macos-${arch}-unsigned.${ext}
  electronLanguages:
    - en-US
    - zh-CN
  notarize: false
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
