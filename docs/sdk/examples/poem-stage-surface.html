<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>命定之诗 — STAGE surface</title>
<!--
  命定之诗 — STAGE surface (play-area redesign P2). The VN stage band for the panel_ui `stage` slot
  [3,0,9,4] (center+right top, ~75% × ~33%). Reads as ONE continuous surface with the top of the SELF
  surface to its left: both draw the SAME full-viewport background offset by their own window-x
  (window.rptHost.getPanelGeometry — the P0 seam-slicing primitive), so the dusk scene runs unbroken
  from the user's portrait across to the NPCs. See docs/design/poem-play-area-redesign.md §1.1, §4.2, §4.4.

  Cast (who is ON STAGE) is grounded in the real schema
  (FrontEnd-for-destined-journey-TPR-STS/src/data_schema): a partner is present when
  stat_data.关系列表[name].在场 === true. "Speaking" is the one signal not in the schema — the card's
  agent MAY write stat_data.stage = { speaking:<name>, background:<asset> } per turn; absent, we fall
  back to the highest-好感度 present member. The active speaker is bright + nameplated + tagged 正在交谈;
  silent members are dimmed (opacity .4; saturate .5).

  Coordinates via the card event channel (window.rptHost.broadcastEvent / eventOn):
    · listens `self:fold`  → gently dims the stage while the SELF drawer is open (focus shift).
    · listens `stage:cast-changed` → refresh (a card agent can push it; we also refresh on
      mag_variable_updated / message_updated so 在场 changes are caught without it).

  Portraits via window.assetUrl(name,'立绘',mood). The panoramic band background resolves with the
  precedence: card override stat_data.stage.background → 地点 (stat_data.世界.地点) as 全景 then 背景 →
  themed gradient fallback; re-resolved when 地点 changes. Misses keep the gradient + log one console.warn.
  Opens standalone (mock cast + ?assets=全景|背景|none stub) for preview.
  VERIFY rendering + live data in-app (manual-verify). NOTE (PM-B6): the card-facing window.assetUrl seam
  currently hardcodes the 'character' asset category in BOTH transports (worldAssetService.assetUrlForWorld
  :166; cardBridge/host.ts:274), so location-category types (背景/全景) cannot resolve in-app yet — the
  band will fall back to the gradient until that seam infers category from type. See the PM-B6 report.
-->
<style>
  /* Palette + fonts + the 4 themes live in the shared token file. */
  @import url('./poem-themes.css');
  :root { --vw: 100vw; --panel-x: 0px; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { height: 100vh; overflow: hidden; color: var(--text); background: var(--night); font-family: var(--sans); }

  .stage { position: relative; width: 100%; height: 100vh; overflow: hidden; }
  /* the shared background, drawn full-viewport-width and shifted by this panel's window-x so it lines
     up seamlessly with the SELF band's slice to the left */
  .scene {
    position: absolute; inset: 0; z-index: 0; background-color: var(--night);
    background-image:
      radial-gradient(70% 90% at 22% 42%, var(--scene-a) 0%, transparent 55%),
      radial-gradient(70% 90% at 88% 30%, var(--scene-b) 0%, transparent 55%),
      radial-gradient(60% 80% at 40% 128%, var(--scene-glow), transparent 60%),
      linear-gradient(180deg, color-mix(in srgb, var(--scene-a) 26%, var(--night)), var(--night) 78%);
    background-repeat: no-repeat;
    background-size: var(--vw) 100%;
    background-position: calc(-1 * var(--panel-x)) 0;
    transition: filter .4s ease, opacity .4s ease;
  }
  .scene.has-img { background-image: var(--scene-img); }
  .scene::before {
    content: ''; position: absolute; inset: 0; opacity: .3;
    background: repeating-linear-gradient(103deg, transparent 0 26px, rgba(0, 0, 0, .14) 26px 28px);
  }
  /* bottom fade so the band melts into the story/world columns below — no hard seam */
  .scene::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: 0; height: 30%;
    background: linear-gradient(180deg, transparent, var(--night));
  }
  /* dim the whole stage while the SELF fold is open (focus shifts to the drawer) */
  .stage.self-folded .scene { filter: brightness(.7) saturate(.85); }
  .stage.self-folded .cast { opacity: .55; }

  .cast { position: absolute; inset: 0; z-index: 1; transition: opacity .4s ease; }
  .fig {
    position: absolute; bottom: 0; transform: translateX(-50%);
    max-height: 100%; object-fit: contain; object-position: bottom center;
    transition: opacity .35s ease, filter .35s ease, transform .35s ease;
  }
  .fig-ph {
    position: absolute; bottom: -6px; transform: translateX(-50%); font-family: var(--serif);
    font-weight: 900; line-height: .8; color: rgba(233, 227, 212, .9);
    text-shadow: 0 12px 46px rgba(0, 0, 0, .55);
  }
  .fig.dim, .fig-ph.dim { opacity: .4; filter: saturate(.5) brightness(.7); }
  .fig.active { filter: drop-shadow(0 0 30px rgba(215, 107, 143, .35)); }

  /* speaker nameplate → solid night-glass backing plate + gilt left bar (v4 mock .nameplate;
     PM-B7/PM-B3 fix #1 — the plate replaces the radial scrim so the tag reads over the light 立绘) */
  .nameplate {
    position: absolute; bottom: 16px; z-index: 3; transform: translateX(-50%);
    background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--gold-dim);
    border-radius: 12px; padding: 9px 16px 9px 22px; box-shadow: 0 8px 30px rgba(0, 0, 0, .45);
  }
  .nameplate::before {
    content: ''; position: absolute; left: 10px; top: 9px; bottom: 9px; width: 3px; border-radius: 2px;
    background: linear-gradient(180deg, var(--gold), transparent);
  }
  .np-name { display: block; font-family: var(--serif); font-size: 20px; font-weight: 700; line-height: 1.2; }
  .np-tag { font-family: var(--mono); font-size: 11px; letter-spacing: .04em; color: var(--gold); margin-top: 2px; }
  .np-tag .sep { color: var(--gold); margin: 0 5px; }  /* PM-B3: --gold-dim fails AA at 11px on glass; --gold ≥7.2:1 */
  /* 正在交谈 pill — v4 mock .np-live: gold fill, night text, riding the plate's top-right edge */
  .np-live {
    position: absolute; top: -9px; right: 12px; z-index: 4;
    font-family: var(--mono); font-size: 10.5px; letter-spacing: .14em;
    color: var(--night); background: var(--gold); padding: 2px 8px; border-radius: 999px;
  }
  /* scene tag → night-glass card (v4 mock .scenetag: glass-soft, blur, --line-soft border) */
  .scene-tag {
    position: absolute; top: 12px; right: 16px; z-index: 3; font-family: var(--mono); font-size: 11.5px;
    color: var(--dim); background: var(--glass-soft); backdrop-filter: blur(10px);
    border: 1px solid var(--line-soft); padding: 5px 11px; border-radius: 9px;
  }
  .scene-tag .sep { color: var(--gold); margin: 0 6px; }  /* PM-B3: --gold-dim fails AA at 11.5px on glass-soft; --gold ≥7.2:1 */
  .empty {
    position: absolute; inset: 0; z-index: 2; display: flex; align-items: center; justify-content: center;
    color: var(--gold); font-family: var(--mono); font-size: 12px; letter-spacing: .2em;  /* PM-B3: 此刻无人在场 — --gold-dim@12px fails AA (3.1:1 ember), --gold ≥7.2:1 */
  }
  @media (prefers-reduced-motion: reduce) { .scene, .cast, .fig, .fig-ph { transition: none; } }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="scene" id="scene"></div>
    <div class="scene-tag" id="sceneTag"></div>
    <div class="cast" id="cast"></div>
  </div>

<script>
;(function () {
  'use strict'

  // ── play-area theme (4 palettes in poem-themes.css; SELF owns the switcher, we follow) ──
  var POEM_THEMES = ['dusk', 'frost', 'ember', 'verdant']
  function poemTheme() {
    try {
      if (typeof getVariables === 'function') {
        var kv = getVariables({ type: 'chat' })
        if (kv && typeof kv.then !== 'function' && POEM_THEMES.indexOf(kv['poem.theme']) >= 0) return kv['poem.theme']
      }
    } catch (_) {}
    try {
      var u = new URLSearchParams(location.search).get('theme')
      if (POEM_THEMES.indexOf(u) >= 0) return u
      var ls = localStorage.getItem('poem.theme')
      if (POEM_THEMES.indexOf(ls) >= 0) return ls
    } catch (_) {}
    return 'dusk'
  }
  function applyPoemTheme(id) {
    document.documentElement.dataset.poemTheme = POEM_THEMES.indexOf(id) >= 0 ? id : 'dusk'
  }
  applyPoemTheme(poemTheme())

  // Dim the present-but-silent members (VN focus on the speaker)? Off for now per owner — everyone on
  // stage renders at full brightness; only the speaker still gets the glow + nameplate + 正在交谈 tag.
  // Flip to true to bring the silent-member dim back (the `.fig.dim`/`.fig-ph.dim` CSS is untouched).
  var DIM_SILENT = false
  var idleCls = function () { return DIM_SILENT ? ' dim' : '' }

  // standalone-preview fallback (only used when getVariables is absent)
  var MOCK = {
    世界: { 时间: '暮 · 戌时', 地点: '艾瑟嘉德' },
    stage: { speaking: '薇拉' },
    关系列表: {
      薇拉: { 在场: true, 职业: ['灰隐者'], 好感度: 64, 命定契约: false },
      恩里克: { 在场: true, 职业: ['见习骑士'], 好感度: 38 },
      赛琳: { 在场: false, 职业: ['吟游诗人'], 好感度: 20 }
    }
  }

  // Standalone-preview asset stub — only installed when the real host is absent (no getVariables). In-app
  // the runtime provides window.assetUrl; this lets the browser preview exercise the resolution paths.
  // ?assets= controls what "exists": '全景' (default) → 地点 全景 hit; '背景' → 全景 miss, 背景 hit;
  // 'none' → total miss (gradient + warn). A 1×1 gif keeps it self-contained.
  if (typeof getVariables !== 'function' && typeof window.assetUrl !== 'function') {
    var STUB_HAVE = (new URLSearchParams(location.search).get('assets')) || '全景'
    var STUB_IMG = 'data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw=='
    window.assetUrl = function (name, type) {
      return Promise.resolve(STUB_HAVE !== 'none' && type === STUB_HAVE ? STUB_IMG : null)
    }
  }

  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c] }) }
  var num = function (v, d) { var n = Number(v); return isFinite(n) ? n : (d == null ? 0 : d) }
  var firstStr = function (a) { return Array.isArray(a) ? a.filter(Boolean).join(' · ') : (a || '') }

  // ── typed projection: cast (who is on stage) + scene — grounded in the real schema ──
  function stageState(SD) {
    SD = SD && typeof SD === 'object' ? SD : {}
    var rel = SD['关系列表'] && typeof SD['关系列表'] === 'object' ? SD['关系列表'] : {}
    var stage = SD['stage'] && typeof SD['stage'] === 'object' ? SD['stage'] : {}
    var present = Object.keys(rel).filter(function (n) { return rel[n] && rel[n]['在场'] === true })
    // speaker: the card-authored signal if present, else the highest-好感度 present member
    var speaking = stage['speaking'] && present.indexOf(stage['speaking']) >= 0 ? stage['speaking'] : null
    if (!speaking && present.length) {
      speaking = present.slice().sort(function (a, b) { return num(rel[b]['好感度']) - num(rel[a]['好感度']) })[0]
    }
    var cast = present.map(function (n) {
      var p = rel[n] || {}
      return {
        name: n,
        tag: [firstStr(p['职业']) || firstStr(p['身份']), p['好感度'] != null ? '好感 ' + num(p['好感度']) : '']
          .filter(Boolean).join(' · '),
        mood: p['当前情绪'] || p['心情'] || undefined,
        contracted: !!p['命定契约'],
        speaking: n === speaking
      }
    })
    return {
      cast: cast,
      scene: {
        time: (SD['世界'] || {})['时间'] || '',
        location: (SD['世界'] || {})['地点'] || '',
        bg: stage['background'] || ''   // card-authored override (takes precedence over 地点)
      }
    }
  }

  var castEl = document.getElementById('cast')
  var sceneEl = document.getElementById('scene')
  var sceneTagEl = document.getElementById('sceneTag')

  // spread N sprites across the width; the speaker sits a touch toward center-right and in front
  function xFor(i, n) {
    if (n <= 1) return 62
    var lo = 20, hi = 88
    return Math.round(lo + (hi - lo) * (i / (n - 1)))
  }

  function render() {
    statData().then(function (SD) {
      var s = stageState(SD)
      // scene tag (time · location)
      var st = []
      if (s.scene.time) st.push(esc(s.scene.time))
      if (s.scene.location) st.push(esc(s.scene.location))
      sceneTagEl.innerHTML = st.join('<span class="sep">·</span>')
      sceneTagEl.style.display = st.length ? '' : 'none'
      // band background: card override → 地点 全景 → 地点 背景 → themed gradient
      loadScene(s.scene.bg, s.scene.location)

      // cast
      if (!s.cast.length) {
        castEl.innerHTML = '<div class="empty">此刻无人在场</div>'
        return
      }
      castEl.innerHTML = ''
      // even slots across the band, but give the SPEAKER the prominent centre-right slot and let the
      // silent members flank it; then draw silent first, speaker last (on top)
      var n = s.cast.length
      var slots = s.cast.map(function (_m, i) { return xFor(i, n) })
      var centerIdx = 0
      slots.forEach(function (x, i) { if (Math.abs(x - 58) < Math.abs(slots[centerIdx] - 58)) centerIdx = i })
      var rest = slots.slice()
      var speaker = null
      s.cast.forEach(function (m) { if (m.speaking) speaker = m })
      if (speaker) { speaker._x = slots[centerIdx]; rest.splice(centerIdx, 1) }
      var oi = 0
      s.cast.forEach(function (m) { if (!m.speaking) m._x = rest[oi++] })
      var ordered = s.cast.slice().sort(function (a, b) { return (a.speaking ? 1 : 0) - (b.speaking ? 1 : 0) })
      ordered.forEach(function (m) {
        var wrap = document.createElement('div')
        wrap.style.position = 'absolute'; wrap.style.inset = '0'
        var ph = document.createElement('div')
        ph.className = 'fig-ph' + (m.speaking ? ' active' : idleCls())
        ph.textContent = String(m.name || '?').charAt(0)
        ph.style.left = m._x + '%'
        ph.style.fontSize = m.speaking ? 'min(30vw, 78vh)' : 'min(24vw, 62vh)'
        wrap.appendChild(ph)
        loadFig(wrap, ph, m)
        if (m.speaking) {
          var np = document.createElement('div'); np.className = 'nameplate'; np.style.left = m._x + '%'
          np.innerHTML = '<span class="np-live">正在交谈</span>' +
            '<span class="np-name">' + esc(m.name) + '</span>' +
            (m.tag ? '<span class="np-tag">' + m.tag.split(' · ').map(esc).join('<span class="sep">·</span>') +
              (m.contracted ? '<span class="sep">·</span>命定' : '') + '</span>' : '')
          wrap.appendChild(np)
        }
        castEl.appendChild(wrap)
      })
    })
  }

  function loadFig(wrap, ph, m) {
    if (typeof window.assetUrl !== 'function') return
    try {
      Promise.resolve(window.assetUrl(m.name, '立绘', m.mood)).then(function (url) {
        if (!url) return
        var img = document.createElement('img')
        img.className = 'fig' + (m.speaking ? ' active' : idleCls())
        img.alt = m.name; img.style.left = m._x + '%'
        img.onload = function () { ph.style.display = 'none' }
        img.onerror = function () { img.remove() }
        img.src = url
        wrap.insertBefore(img, wrap.firstChild)
      })
    } catch (_) {}
  }
  // Resolve the band background with the documented precedence:
  //   1. card-authored override (stat_data.stage.background) — as 全景 then 背景
  //   2. 地点 (stat_data.世界.地点) — as 全景 (panoramic; ensemble mode's showcase) then 背景
  //   3. themed gradient fallback (the .scene default; no --scene-img / no .has-img)
  // On a total miss we KEEP the gradient placeholder and emit ONE console.warn naming the keys tried,
  // instead of silently dropping the image (the old img.onerror-removal bug that hid every miss).
  var sceneKey = null   // last resolved candidate list — skip redundant re-resolves
  function loadScene(override, location) {
    // candidate (name,type) pairs in precedence order; the panoramic band prefers 全景
    var tries = []
    if (override) tries.push([override, '全景'], [override, '背景'])
    if (location) tries.push([location, '全景'], [location, '背景'])
    var key = tries.map(function (t) { return t[0] + '/' + t[1] }).join('|')
    if (key === sceneKey) return   // 地点 unchanged → no work
    sceneKey = key

    if (!tries.length || typeof window.assetUrl !== 'function') {
      sceneEl.classList.remove('has-img')
      sceneEl.style.removeProperty('--scene-img')
      return
    }
    // walk the candidates; apply the first that resolves, else warn + fall back to the gradient
    var i = 0
    function next() {
      if (i >= tries.length) {
        sceneEl.classList.remove('has-img')
        sceneEl.style.removeProperty('--scene-img')
        console.warn('[poem-stage] no band background asset for [' +
          tries.map(function (t) { return t[1] + ':' + t[0] }).join(', ') + '] — using themed gradient')
        return
      }
      var t = tries[i++]
      try {
        Promise.resolve(window.assetUrl(t[0], t[1])).then(function (url) {
          if (url) {
            sceneEl.style.setProperty('--scene-img', 'url("' + url + '")')
            sceneEl.classList.add('has-img')
          } else next()
        }, next)
      } catch (_) { next() }
    }
    next()
  }

  // ── host access ──────────────────────────────────────────────────────────────────
  function statData() {
    try {
      if (typeof getVariables !== 'function') return Promise.resolve(MOCK)
      var v = getVariables()
      if (v && typeof v.then === 'function') return v.then(function (r) { return (r || {}).stat_data || {} })
      return Promise.resolve((v || {}).stat_data || {})
    } catch (_) { return Promise.resolve(MOCK) }
  }
  function applyGeometry(g) {
    if (!g) return
    var root = document.documentElement.style
    if (g.viewportWidth) root.setProperty('--vw', g.viewportWidth + 'px')
    root.setProperty('--panel-x', (g.x || 0) + 'px')
  }

  // geometry: seed + subscribe (WCV only)
  if (window.rptHost && typeof window.rptHost.getPanelGeometry === 'function') {
    applyGeometry(window.rptHost.getPanelGeometry())
    window.rptHost.onPanelGeometry(applyGeometry)
  }

  render()

  // coordination + data-change refresh (coalesced)
  if (typeof eventOn === 'function') {
    var pending = false
    var refresh = function () {
      if (pending) return
      pending = true
      Promise.resolve().then(function () { pending = false; render() })
    }
    eventOn('mag_variable_updated', refresh)
    eventOn('message_updated', refresh)
    eventOn('stage:cast-changed', refresh)
    eventOn('poem:theme', function (p) { applyPoemTheme(p && p.id) })
    // dim the stage while the SELF drawer is open (the fold↔stage focus link)
    eventOn('self:fold', function (p) {
      document.getElementById('stage').classList.toggle('self-folded', !!(p && p.open))
    })
  }
})()
</script>
</body>
</html>
