<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>命定之诗 — 地图</title>
<!--
  命定之诗 — 地图 OVERLAY surface (PM-G5). A full-play-area card surface declared in panel_ui.overlays as
  `poem-map` and raised by the pinned 世界 card's 地图 glyph button: WORLD calls
  rptHost.requestOverlay('poem-map') (poem-world-surface.html openMap), and the app mounts THIS page as a
  transparent WCV over the whole grid region (PM-A7). See docs/design/poem-status-parity-design-2026-07-07.md
  §4 (+ §5 for the mechanism).

  Parity target: FrontEnd-for-destined-journey-TPR-STS/src/status/pages/map/MapTab.tsx — the pan/zoom map
  viewer + player marker annotations (name / group / description, search, focus). This surface ports the SAME
  information + interactions; the LOOK is ours (night-glass, poem-themes.css). Documented parity EXCEPTIONS
  (design §4): NO free-draw canvas layer, NO small/large dual map sources, NO OpenSeadragon deep-zoom — v1 is
  a plain CSS-transform viewer. Markers are player annotations in chat KV (NOT MVU) → always editable,
  independent of PM-G4's edit mode (PRD out-of-scope list).

  Layout (glass sheet on its own scrim):
    · header plate: 地图 title + current 地点 (stat_data.世界.地点) + a search box + ✕ close. When the
      current 地点 has no matching marker, a floating gilt tag 当前：<地点>（未标记）rides the header.
    · stage: a clipped viewer. One <img> in a transformed layer (translate(tx,ty) scale(s), s∈[0.5,8]);
      drag-pan (pointer capture), wheel-zoom toward the cursor, two-pointer pinch. Markers live in a
      NON-transformed overlay layer (repositioned per frame) so pins stay screen-sized + labels legible.

  Map image: assetUrl('世界地图','背景'). A miss keeps a themed-gradient stage + a centered hint
    暂无地图 — 提供名为 世界地图_背景 的素材 and logs ONE console.warn naming the exact key tried (PM-B6 idiom).

  Markers: chat KV map.markers = [{ id, x, y, name, group?, desc? }], x/y normalized 0..1 (survive any image
    size). Read via getVariables({type:'chat'}), written via updateVariablesWith (poem.theme/poem.sheet
    pattern). Add = press-and-hold 500ms on empty map → pin drops + inline name editor focused. Edit = click a
    pin → floating card (name / group / desc / 聚焦 / 删除-with-confirm). Search matches name/group; Enter
    focuses the first hit (animated center + s=2). The pin whose name === current 地点 gets an ember pulse ring.

  Standalone preview (getVariables absent): MOCK markers + a stub SVG map; ?assets=none exercises the miss
    state; KV writes fall back to localStorage. Theme via poem:theme + KV (SELF owns the switcher; we follow).
  Close (✕ / Esc / scrim click) calls rptHost.closeOverlay() behind a typeof-guard — so the page still opens
  standalone in a browser. VERIFY live open + data in-app (manual-verify).

  CONTRAST (poem-themes.css header): text ≤12px stays on the SAFE token list (--gold/--text/--dim/--faint) in
  all 4 palettes; CJK-bearing text ≥12px (numeric/mono runs may stay 11px). Accents ride --gold/--ember via
  color-mix and never carry small text alone. Hit targets ≥32px; pins get an invisible 24px hit halo.
-->
<style>
  /* Palette + fonts + the 4 themes live in the shared token file (switch via dataset.poemTheme). */
  @import url('./poem-themes.css');

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    height: 100vh; overflow: hidden; color: var(--text);
    background: transparent;  /* PM-A7 transparent-WCV route: the surface paints its own scrim */
    font-family: var(--sans); -webkit-font-smoothing: antialiased;
  }

  /* ── scrim: dims the frozen play area behind the sheet (PM-A7 ships the WCV transparent) ── */
  .scrim {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    padding: 24px; background: rgba(0, 0, 0, .55); backdrop-filter: blur(6px);
    opacity: 0; transition: opacity .24s ease;
  }
  .scrim.open { opacity: 1; }

  /* ── the glass sheet ── */
  .sheet {
    position: relative; width: min(1120px, 96vw); height: 88vh; max-height: 88vh;
    display: flex; flex-direction: column; overflow: hidden; border-radius: 16px;
    background: var(--glass); backdrop-filter: blur(14px); border: 1px solid var(--line-soft);
    box-shadow: 0 24px 64px rgba(0, 0, 0, .5);
    transform: translateY(4px); opacity: 0; transition: transform .24s cubic-bezier(.4, 0, .2, 1), opacity .24s ease;
  }
  .scrim.open .sheet { transform: translateY(0); opacity: 1; }

  /* ── header plate (title + 地点 + search + close) ── */
  .mp-head {
    flex: 0 0 auto; position: relative; display: flex; align-items: center; gap: 12px;
    padding: 12px 52px 12px 20px; border-bottom: 1px solid var(--line-soft);
  }
  .mp-head::before {
    content: ''; position: absolute; left: 10px; top: 14px; bottom: 12px; width: 3px; border-radius: 2px;
    background: linear-gradient(180deg, var(--gold), transparent);
  }
  .mp-title { font-family: var(--serif); font-size: 20px; font-weight: 700; line-height: 1.2; flex: 0 0 auto; }
  .mp-loc { font-family: var(--mono); font-size: 12px; letter-spacing: .04em; color: var(--dim); flex: 0 0 auto; }  /* PM-B5: CJK 地点 → ≥12px; --dim ≥7.1:1 */
  .mp-loc .sep { color: var(--gold-dim); margin: 0 6px; }  /* separator decor */
  .mp-untag {
    flex: 0 0 auto; font-family: var(--mono); font-size: 12px; color: var(--gold);  /* PM-B3 gilt ≥7.2:1. PM-B5: CJK → ≥12px */
    border: 1px solid var(--gold-dim); border-radius: 999px; padding: 2px 10px;
    background: color-mix(in srgb, var(--gold) 10%, transparent); white-space: nowrap;
  }
  .mp-untag[hidden] { display: none; }
  .mp-spacer { flex: 1 1 auto; min-width: 8px; }
  .mp-search {
    flex: 0 0 auto; width: min(220px, 34vw); font-family: var(--sans); font-size: 12px;  /* PM-B5: CJK placeholder/value → ≥12px */
    background: var(--glass-soft); border: 1px solid var(--line-soft); color: var(--text);
    padding: 7px 11px; border-radius: 999px; min-height: 32px;
  }
  .mp-search::placeholder { color: var(--faint); }
  .mp-search:focus-visible { outline: none; border-color: var(--gold-dim); }
  .mp-close {
    position: absolute; top: 8px; right: 8px; z-index: 6;
    width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center;
    background: none; border: none; color: var(--dim); font-size: 22px; line-height: 1; cursor: pointer;
    border-radius: 10px; transition: color .12s ease, background .12s ease;
  }
  .mp-close:hover, .mp-close:focus-visible { outline: none; color: var(--gold); background: color-mix(in srgb, var(--text) 8%, transparent); }

  /* ── viewer stage (the ONLY interactive surface) ── */
  .mp-stage {
    position: relative; flex: 1 1 auto; min-height: 0; overflow: hidden; touch-action: none; cursor: grab;
    background:
      radial-gradient(120% 90% at 30% 15%, color-mix(in srgb, var(--scene-b) 40%, transparent), transparent 60%),
      radial-gradient(120% 90% at 80% 85%, color-mix(in srgb, var(--scene-a) 34%, transparent), transparent 62%),
      var(--sunken);
  }
  .mp-stage.grabbing { cursor: grabbing; }

  /* the transformed map layer — only the <img> lives here; markers ride a separate screen-space layer */
  .mp-layer {
    position: absolute; left: 0; top: 0; transform-origin: 0 0; will-change: transform;
    /* size set from the image's contain-fit; no transition (JS drives every move, drag + rAF focus tween) */
  }
  .mp-img { display: block; width: 100%; height: 100%; user-select: none; -webkit-user-drag: none; pointer-events: none; }

  /* miss state — themed gradient (above) + centered hint */
  .mp-empty {
    position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; text-align: center; padding: 24px; pointer-events: none;
  }
  .mp-stage.no-map .mp-empty { display: flex; }
  .mp-empty-icon { font-size: 30px; opacity: .5; }
  .mp-empty-t { font-size: 13px; color: var(--dim); line-height: 1.6; }  /* PM-B5: CJK hint → ≥12px */
  .mp-empty-t code { font-family: var(--mono); color: var(--gold); font-size: 12px; }  /* PM-B3 gilt key */

  /* ── screen-space marker layer (repositioned per transform frame; pins stay screen-sized) ── */
  .mp-markers { position: absolute; inset: 0; pointer-events: none; }
  .pin {
    position: absolute; width: 24px; height: 24px; margin: -12px 0 0 -12px;  /* 24px invisible hit halo, centered on x/y */
    display: flex; align-items: flex-start; justify-content: center; pointer-events: auto; cursor: pointer;
    background: none; border: none; padding: 0;
  }
  .pin-dot {
    position: absolute; left: 50%; top: 50%; width: 10px; height: 10px; margin: -5px 0 0 -5px;
    border-radius: 50%; background: var(--gold); border: 1px solid color-mix(in srgb, var(--night) 55%, var(--gold));
    box-shadow: 0 0 8px color-mix(in srgb, var(--gold) 70%, transparent);
  }
  .pin.active .pin-dot { background: var(--ember); border-color: color-mix(in srgb, var(--night) 55%, var(--ember)); box-shadow: 0 0 10px color-mix(in srgb, var(--ember) 75%, transparent); }
  /* current-地点 ember pulse ring (2s loop; static under reduced-motion) */
  .pin.current::after {
    content: ''; position: absolute; left: 50%; top: 50%; width: 10px; height: 10px; margin: -5px 0 0 -5px;
    border-radius: 50%; border: 1.5px solid var(--ember); animation: pinPulse 2s ease-out infinite; pointer-events: none;
  }
  @keyframes pinPulse {
    0% { transform: scale(1); opacity: .9; }
    70% { transform: scale(3.4); opacity: 0; }
    100% { transform: scale(3.4); opacity: 0; }
  }
  .pin-label {
    position: absolute; left: 50%; top: 12px; transform: translateX(-50%); margin-top: 3px;
    max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-size: 12px; color: var(--text); padding: 2px 7px; border-radius: 6px;  /* PM-B5: CJK marker name → ≥12px */
    background: color-mix(in srgb, var(--night) 78%, transparent); border: 1px solid var(--line-soft);
    pointer-events: none;
  }
  /* labels hide below s<0.8 except hovered / active */
  .mp-markers.zoomed-out .pin-label { display: none; }
  .mp-markers.zoomed-out .pin:hover .pin-label,
  .mp-markers.zoomed-out .pin.active .pin-label { display: block; }

  /* ── floating marker edit card (screen-space, clamped inside the stage) ── */
  .mk-card {
    position: absolute; z-index: 8; width: 236px; max-width: calc(100% - 20px);
    background: var(--glass); backdrop-filter: blur(14px); border: 1px solid var(--line-soft);
    border-left: 2px solid var(--gold); border-radius: 12px; box-shadow: 0 16px 40px rgba(0, 0, 0, .5);
    padding: 12px; display: none;
  }
  .mk-card.open { display: block; }
  .mk-row { margin-bottom: 8px; }
  .mk-k { display: block; font-family: var(--mono); font-size: 12px; letter-spacing: .06em; color: var(--gold); font-weight: 600; margin-bottom: 3px; }  /* PM-B3 gilt key. PM-B5: CJK → ≥12px */
  .mk-in, .mk-ta {
    width: 100%; font-family: var(--sans); font-size: 12px; color: var(--text);  /* PM-B5: CJK values → ≥12px */
    background: var(--glass-soft); border: 1px solid var(--line-soft); border-radius: 8px; padding: 6px 9px;
  }
  .mk-ta { resize: vertical; min-height: 52px; line-height: 1.5; }
  .mk-in:focus-visible, .mk-ta:focus-visible { outline: none; border-color: var(--gold-dim); }
  .mk-acts { display: flex; gap: 8px; margin-top: 4px; }
  .mk-btn {
    flex: 1; min-height: 32px; font-family: var(--sans); font-size: 12px; cursor: pointer;  /* PM-B5: CJK button labels → ≥12px */
    background: var(--glass-soft); border: 1px solid var(--line-soft); color: var(--dim); border-radius: 9px; padding: 6px 8px;
  }
  .mk-btn:hover, .mk-btn:focus-visible { outline: none; color: var(--text); border-color: var(--line); }
  .mk-btn.focus { color: var(--gold); border-color: var(--gold-dim); }
  .mk-btn.del { color: var(--ember); border-color: color-mix(in srgb, var(--ember) 45%, var(--line-soft)); }
  .mk-btn.del:hover, .mk-btn.del:focus-visible { color: var(--ember); border-color: var(--ember); background: color-mix(in srgb, var(--ember) 12%, transparent); }
  .mk-card.confirm .mk-acts { display: none; }
  .mk-confirm { display: none; align-items: center; gap: 8px; margin-top: 4px; }
  .mk-card.confirm .mk-confirm { display: flex; }
  .mk-confirm-t { flex: 1; font-size: 12px; color: var(--dim); }  /* PM-B5: CJK confirm text → ≥12px */

  /* ── zoom controls (bottom-right) ── */
  .mp-zoom { position: absolute; right: 12px; bottom: 12px; z-index: 5; display: flex; flex-direction: column; gap: 6px; }
  .zbtn {
    width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 18px; line-height: 1; cursor: pointer;
    background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--line-soft); color: var(--dim); border-radius: 9px;
  }
  .zbtn:hover, .zbtn:focus-visible { outline: none; color: var(--gold); border-color: var(--gold-dim); }
  .zbtn.reset { font-size: 14px; }

  /* ── hint strip (bottom-left) ── */
  .mp-hint {
    position: absolute; left: 12px; bottom: 12px; z-index: 4; pointer-events: none;
    font-family: var(--mono); font-size: 11px; color: var(--faint);  /* numeric-ish helper — 11px OK; --faint ≥4.9:1 */
    background: color-mix(in srgb, var(--night) 62%, transparent); border: 1px solid var(--line-soft);
    border-radius: 8px; padding: 4px 9px;
  }

  @media (prefers-reduced-motion: reduce) {
    .scrim, .sheet { transition: none; }
    .pin.current::after { animation: none; opacity: .8; transform: scale(2.2); }
  }
</style>
</head>
<body>
  <div class="scrim" id="scrim">
    <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="地图">
      <div class="mp-head">
        <span class="mp-title">地图</span>
        <span class="mp-loc" id="mpLoc"></span>
        <span class="mp-untag" id="mpUntag" hidden></span>
        <span class="mp-spacer"></span>
        <input class="mp-search" id="mpSearch" type="search" placeholder="搜索标记…" aria-label="搜索标记" />
        <button class="mp-close" id="mpClose" type="button" aria-label="关闭" title="关闭">✕</button>
      </div>

      <div class="mp-stage" id="mpStage">
        <div class="mp-layer" id="mpLayer"><img class="mp-img" id="mpImg" alt="世界地图" /></div>
        <div class="mp-empty" aria-hidden="true">
          <div class="mp-empty-icon">🗺</div>
          <div class="mp-empty-t">暂无地图 — 提供名为 <code>世界地图_背景</code> 的素材</div>
        </div>
        <div class="mp-markers" id="mpMarkers"></div>

        <div class="mk-card" id="mkCard" role="dialog" aria-label="编辑标记">
          <div class="mk-row"><span class="mk-k">名称</span><input class="mk-in" id="mkName" type="text" aria-label="标记名称" /></div>
          <div class="mk-row"><span class="mk-k">分组</span><input class="mk-in" id="mkGroup" type="text" aria-label="分组" /></div>
          <div class="mk-row"><span class="mk-k">描述</span><textarea class="mk-ta" id="mkDesc" aria-label="描述"></textarea></div>
          <div class="mk-acts">
            <button class="mk-btn focus" id="mkFocus" type="button">聚焦</button>
            <button class="mk-btn del" id="mkDel" type="button">删除</button>
          </div>
          <div class="mk-confirm">
            <span class="mk-confirm-t">确认删除？</span>
            <button class="mk-btn del" id="mkDelYes" type="button">删除</button>
            <button class="mk-btn" id="mkDelNo" type="button">取消</button>
          </div>
        </div>

        <div class="mp-zoom">
          <button class="zbtn" id="zIn" type="button" aria-label="放大" title="放大">＋</button>
          <button class="zbtn" id="zOut" type="button" aria-label="缩小" title="缩小">－</button>
          <button class="zbtn reset" id="zReset" type="button" aria-label="重置视图" title="重置视图">⤢</button>
        </div>
        <div class="mp-hint">拖动平移 · 滚轮缩放 · 长按空白处添加标记</div>
      </div>
    </div>
  </div>

<script>
;(function () {
  'use strict'

  // ── play-area theme (4 palettes in poem-themes.css; SELF owns the switcher, we follow) ──
  var POEM_THEMES = ['dusk', 'frost', 'ember', 'verdant']
  function poemTheme() {
    try {
      if (typeof getVariables === 'function') {
        var kv = getVariables({ type: 'chat' })
        if (kv && typeof kv.then !== 'function' && POEM_THEMES.indexOf(kv['poem.theme']) >= 0) return kv['poem.theme']
      }
    } catch (_) {}
    try {
      var u = new URLSearchParams(location.search).get('theme')
      if (POEM_THEMES.indexOf(u) >= 0) return u
      var ls = localStorage.getItem('poem.theme')
      if (POEM_THEMES.indexOf(ls) >= 0) return ls
    } catch (_) {}
    return 'dusk'
  }
  function applyPoemTheme(id) {
    document.documentElement.dataset.poemTheme = POEM_THEMES.indexOf(id) >= 0 ? id : 'dusk'
  }
  applyPoemTheme(poemTheme())

  var REDUCED = false
  try { REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches } catch (_) {}

  // ── standalone-preview fallbacks (only when the real host is absent) ──────────────────────────
  //   ?assets=none → the map asset misses (gradient + hint + warn); otherwise a stub SVG map loads.
  //   MOCK markers seed the viewer; 世界.地点 == '晨曦镇' matches one marker so the ember pulse shows.
  //   KV writes fall back to localStorage under poem.map.markers.
  var STANDALONE = typeof getVariables !== 'function'
  var STUB_MAP = 'data:image/svg+xml;utf8,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">' +
    '<rect width="1600" height="1000" fill="#1a2233"/>' +
    '<g fill="none" stroke="#33415e" stroke-width="1">' +
    Array.apply(null, Array(16)).map(function (_v, i) { return '<line x1="' + (i * 100) + '" y1="0" x2="' + (i * 100) + '" y2="1000"/>' }).join('') +
    Array.apply(null, Array(10)).map(function (_v, i) { return '<line x1="0" y1="' + (i * 100) + '" x2="1600" y2="' + (i * 100) + '"/>' }).join('') +
    '</g>' +
    '<path d="M120,760 Q420,560 760,640 T1300,520" fill="none" stroke="#4a6a8a" stroke-width="8" opacity="0.7"/>' +
    '<circle cx="470" cy="430" r="70" fill="#2f5a44" opacity="0.8"/>' +
    '<circle cx="1080" cy="640" r="90" fill="#4a3350" opacity="0.7"/>' +
    '<text x="800" y="80" fill="#7a8896" font-family="serif" font-size="34" text-anchor="middle">阿斯塔利亚 · 边境图</text>' +
    '</svg>')
  if (STANDALONE) {
    var Q0 = new URLSearchParams(location.search)
    var HAVE_MAP = Q0.get('assets') !== 'none'
    if (typeof window.assetUrl !== 'function') {
      window.assetUrl = function (name, type) {
        if (name === '世界地图' && type === '背景') return Promise.resolve(HAVE_MAP ? STUB_MAP : null)
        return Promise.resolve(null)
      }
    }
  }
  var MOCK_MARKERS = [
    { id: 'mk-a', x: 0.29, y: 0.43, name: '晨曦镇', group: '据点', desc: '边境线上最后一座还亮着灯的小镇，也是薇拉出发的地方。' },
    { id: 'mk-b', x: 0.67, y: 0.64, name: '雾墙裂口', group: '险地', desc: '灰隐者世代守望的边界，浓雾终年不散。' },
    { id: 'mk-c', x: 0.82, y: 0.30, name: '无名钟楼', group: '', desc: '' }
  ]
  var MOCK_LOC = '晨曦镇'

  // ── helpers ──
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]
    })
  }
  function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v }
  function num(v, d) { var n = Number(v); return isFinite(n) ? n : (d == null ? 0 : d) }
  function newId() { return 'mk-' + Date.now().toString(36) + '-' + Math.random().toString(16).slice(2, 8) }

  // ── DOM handles ──
  var scrimEl = document.getElementById('scrim')
  var stageEl = document.getElementById('mpStage')
  var layerEl = document.getElementById('mpLayer')
  var imgEl = document.getElementById('mpImg')
  var markersEl = document.getElementById('mpMarkers')
  var locEl = document.getElementById('mpLoc')
  var untagEl = document.getElementById('mpUntag')
  var searchEl = document.getElementById('mpSearch')
  var cardEl = document.getElementById('mkCard')

  // ── viewer state ──
  var S_MIN = 0.5, S_MAX = 8
  var tx = 0, ty = 0, s = 1        // layer transform: screen = translate(tx,ty) + local*scale
  var baseW = 0, baseH = 0         // contain-fit size of the map at scale 1
  var stageW = 0, stageH = 0
  var hasMap = false

  // ── marker state ──
  var markers = []
  var activeId = null
  var tweenRaf = 0

  function stageRect() { return stageEl.getBoundingClientRect() }

  function measureStage() {
    var r = stageRect()
    stageW = r.width; stageH = r.height
  }

  // contain-fit the natural image (or the stage itself when there is no map) into the stage at scale 1
  function computeBase() {
    measureStage()
    var nw = hasMap ? (imgEl.naturalWidth || 1600) : stageW
    var nh = hasMap ? (imgEl.naturalHeight || 1000) : stageH
    if (!nw || !nh) { nw = stageW; nh = stageH }
    var fit = Math.min(stageW / nw, stageH / nh) || 1
    baseW = nw * fit; baseH = nh * fit
    layerEl.style.width = baseW + 'px'
    layerEl.style.height = baseH + 'px'
  }

  function resetView() {
    computeBase()
    s = 1
    tx = (stageW - baseW) / 2
    ty = (stageH - baseH) / 2
    applyTransform()
  }

  function clampScale(v) { return clamp(v, S_MIN, S_MAX) }

  // reposition a pin element from its normalized coords under the current transform
  function pinScreen(m) {
    return { x: tx + m.x * baseW * s, y: ty + m.y * baseH * s }
  }

  function applyTransform() {
    layerEl.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + s + ')'
    markersEl.classList.toggle('zoomed-out', s < 0.8)
    // reposition every pin (screen-space; pins stay a constant size)
    Array.prototype.forEach.call(markersEl.children, function (el) {
      var m = markerById(el.dataset.id)
      if (!m) return
      var p = pinScreen(m)
      el.style.left = p.x + 'px'
      el.style.top = p.y + 'px'
    })
    positionCard()
  }

  // zoom keeping the layer-local point under (px,py) fixed (cursor / pinch-midpoint anchored)
  function zoomTo(newS, px, py) {
    newS = clampScale(newS)
    if (!baseW) return
    var lx = (px - tx) / s, ly = (py - ty) / s
    s = newS
    tx = px - lx * s
    ty = py - ly * s
    applyTransform()
  }

  // rAF tween for programmatic focus moves (160ms; instant under reduced-motion)
  function tweenTo(nTx, nTy, nS) {
    if (tweenRaf) { cancelAnimationFrame(tweenRaf); tweenRaf = 0 }
    nS = clampScale(nS)
    if (REDUCED) { tx = nTx; ty = nTy; s = nS; applyTransform(); return }
    var sTx = tx, sTy = ty, sS = s, t0 = 0, dur = 160
    function step(ts) {
      if (!t0) t0 = ts
      var k = clamp((ts - t0) / dur, 0, 1)
      var e = 1 - Math.pow(1 - k, 3)   // ease-out cubic
      tx = sTx + (nTx - sTx) * e
      ty = sTy + (nTy - sTy) * e
      s = sS + (nS - sS) * e
      applyTransform()
      if (k < 1) tweenRaf = requestAnimationFrame(step); else tweenRaf = 0
    }
    tweenRaf = requestAnimationFrame(step)
  }

  function focusMarker(m, toScale) {
    var ns = toScale != null ? clampScale(toScale) : Math.max(s, 2)
    var nTx = stageW / 2 - m.x * baseW * ns
    var nTy = stageH / 2 - m.y * baseH * ns
    tweenTo(nTx, nTy, ns)
  }

  // ── markers: model + persistence ──
  function markerById(id) { for (var i = 0; i < markers.length; i++) if (markers[i].id === id) return markers[i]; return null }

  function normalizeMarkers(arr) {
    if (!Array.isArray(arr)) return []
    return arr.filter(function (m) { return m && typeof m === 'object' }).map(function (m) {
      return {
        id: m.id != null ? String(m.id) : newId(),
        x: clamp(num(m.x), 0, 1),
        y: clamp(num(m.y), 0, 1),
        name: m.name != null ? String(m.name) : '',
        group: m.group != null ? String(m.group) : '',
        desc: m.desc != null ? String(m.desc) : ''
      }
    })
  }

  function persist() {
    var out = markers.map(function (m) {
      var o = { id: m.id, x: m.x, y: m.y, name: m.name }
      if (m.group) o.group = m.group
      if (m.desc) o.desc = m.desc
      return o
    })
    try {
      if (typeof updateVariablesWith === 'function') {
        updateVariablesWith(function (prev) {
          var n = prev && typeof prev === 'object' ? prev : {}
          n['map.markers'] = out
          return n
        }, { type: 'chat' })
        return
      }
    } catch (_) {}
    try { localStorage.setItem('poem.map.markers', JSON.stringify(out)) } catch (_) {}
  }

  var persistTimer = 0
  function persistSoon() {
    if (persistTimer) clearTimeout(persistTimer)
    persistTimer = setTimeout(function () { persistTimer = 0; persist() }, 500)
  }

  // ── host access ──
  function chatKV() {
    try {
      if (typeof getVariables !== 'function') return Promise.resolve(null)
      var v = getVariables({ type: 'chat' })
      if (v && typeof v.then === 'function') return v.then(function (r) { return r || {} })
      return Promise.resolve(v || {})
    } catch (_) { return Promise.resolve(null) }
  }
  function statData() {
    try {
      if (typeof getVariables !== 'function') return Promise.resolve(null)
      var v = getVariables()
      if (v && typeof v.then === 'function') return v.then(function (r) { return (r || {}).stat_data || {} })
      return Promise.resolve((v || {}).stat_data || {})
    } catch (_) { return Promise.resolve(null) }
  }
  function readStoredMarkers(kv) {
    if (kv && Array.isArray(kv['map.markers'])) return normalizeMarkers(kv['map.markers'])
    if (STANDALONE) {
      try { var ls = JSON.parse(localStorage.getItem('poem.map.markers') || 'null'); if (Array.isArray(ls)) return normalizeMarkers(ls) } catch (_) {}
      return normalizeMarkers(MOCK_MARKERS)
    }
    return []
  }
  function currentLocation(SD) {
    if (SD && SD['世界'] && typeof SD['世界'] === 'object') return SD['世界']['地点'] || ''
    return STANDALONE ? MOCK_LOC : ''
  }

  // ── render pins ──
  function renderMarkers() {
    markersEl.innerHTML = markers.map(function (m) {
      var isActive = m.id === activeId
      return '<button type="button" class="pin' + (isActive ? ' active' : '') + '" data-id="' + esc(m.id) + '" aria-label="' + esc(m.name || '未命名标记') + '">' +
        '<span class="pin-dot"></span>' +
        '<span class="pin-label">' + esc(m.name || '未命名标记') + '</span></button>'
    }).join('')
    markLocation(lastLocation)
    applyTransform()
  }

  // apply the current-地点 pulse ring + header tag (name-match against markers)
  var lastLocation = ''
  function markLocation(loc) {
    lastLocation = loc || ''
    locEl.innerHTML = loc ? '地点<span class="sep">·</span>' + esc(loc) : ''
    var matched = null
    if (loc) for (var i = 0; i < markers.length; i++) if (markers[i].name === loc) { matched = markers[i]; break }
    Array.prototype.forEach.call(markersEl.children, function (el) {
      el.classList.toggle('current', !!matched && el.dataset.id === matched.id)
    })
    if (loc && !matched) { untagEl.textContent = '当前：' + loc + '（未标记）'; untagEl.hidden = false }
    else { untagEl.hidden = true }
  }

  // ── marker edit card ──
  var cardMarkerId = null
  function openCard(id) {
    var m = markerById(id); if (!m) return
    cardMarkerId = id; activeId = id
    cardEl.classList.remove('confirm')
    document.getElementById('mkName').value = m.name || ''
    document.getElementById('mkGroup').value = m.group || ''
    document.getElementById('mkDesc').value = m.desc || ''
    cardEl.classList.add('open')
    // reflect active state on pins without a full rebuild
    Array.prototype.forEach.call(markersEl.children, function (el) { el.classList.toggle('active', el.dataset.id === id) })
    positionCard()
  }
  function closeCard() {
    cardEl.classList.remove('open', 'confirm')
    var prev = cardMarkerId
    cardMarkerId = null; activeId = null
    if (prev) { var el = markersEl.querySelector('.pin[data-id="' + (window.CSS && CSS.escape ? CSS.escape(prev) : prev) + '"]'); if (el) el.classList.remove('active') }
    markLocation(lastLocation)
  }
  function positionCard() {
    if (!cardEl.classList.contains('open') || !cardMarkerId) return
    var m = markerById(cardMarkerId); if (!m) return
    var p = pinScreen(m)
    var cw = cardEl.offsetWidth || 236, ch = cardEl.offsetHeight || 200
    var pad = 10
    var left = clamp(p.x - cw / 2, pad, Math.max(pad, stageW - cw - pad))
    var top = p.y + 16
    if (top + ch > stageH - pad) top = clamp(p.y - ch - 16, pad, stageH - ch - pad)
    cardEl.style.left = left + 'px'
    cardEl.style.top = top + 'px'
  }

  // ── image load + miss state (PM-B6 idiom) ──
  function loadMap() {
    if (typeof window.assetUrl !== 'function') { onMapMiss(); return }
    try {
      Promise.resolve(window.assetUrl('世界地图', '背景')).then(function (url) {
        if (!url) { onMapMiss(); return }
        imgEl.onload = function () { hasMap = true; stageEl.classList.remove('no-map'); resetView() }
        imgEl.onerror = function () { console.warn('[poem-map] 世界地图_背景 asset failed to load: ' + url); onMapMiss() }
        imgEl.src = url
      }, onMapMiss)
    } catch (_) { onMapMiss() }
  }
  function onMapMiss() {
    hasMap = false
    imgEl.removeAttribute('src')
    stageEl.classList.add('no-map')
    console.warn('[poem-map] no map asset for [背景:世界地图] — using themed gradient')
    resetView()
  }

  // ── pointer interaction: drag-pan · press-hold add · wheel zoom · pinch ──
  var pointers = {}     // id → {x,y}
  var panStart = null   // {px,py,tx,ty}
  var pinchStart = null // {dist,mx,my,tx,ty,s}
  var holdTimer = 0
  var moved = false
  var downTime = 0
  var MOVE_THRESH = 6

  function stagePoint(ev) { var r = stageRect(); return { x: ev.clientX - r.left, y: ev.clientY - r.top } }
  function pointerList() { return Object.keys(pointers).map(function (k) { return pointers[k] }) }
  function clearHold() { if (holdTimer) { clearTimeout(holdTimer); holdTimer = 0 } }

  function dropPin(px, py) {
    if (!baseW) return
    var lx = (px - tx) / s, ly = (py - ty) / s
    var m = { id: newId(), x: clamp(lx / baseW, 0, 1), y: clamp(ly / baseH, 0, 1), name: '新标记', group: '', desc: '' }
    markers.push(m)
    persist()
    renderMarkers()
    openCard(m.id)
    // focus the name field + select its text for immediate rename
    var nameEl = document.getElementById('mkName')
    try { nameEl.focus(); nameEl.select() } catch (_) {}
  }

  stageEl.addEventListener('pointerdown', function (ev) {
    // ignore presses that begin on a pin, the edit card, or the zoom controls
    if (ev.target.closest && (ev.target.closest('.pin') || ev.target.closest('.mk-card') || ev.target.closest('.mp-zoom'))) return
    try { stageEl.setPointerCapture(ev.pointerId) } catch (_) {}
    pointers[ev.pointerId] = stagePoint(ev)
    var ids = Object.keys(pointers)
    if (ids.length === 1) {
      moved = false; downTime = Date.now()
      panStart = { px: pointers[ev.pointerId].x, py: pointers[ev.pointerId].y, tx: tx, ty: ty }
      stageEl.classList.add('grabbing')
      var hx = panStart.px, hy = panStart.py
      clearHold()
      holdTimer = setTimeout(function () { holdTimer = 0; if (!moved) dropPin(hx, hy) }, 500)
    } else if (ids.length === 2) {
      clearHold()
      var a = pointers[ids[0]], b = pointers[ids[1]]
      var dx = a.x - b.x, dy = a.y - b.y
      pinchStart = { dist: Math.hypot(dx, dy) || 1, mx: (a.x + b.x) / 2, my: (a.y + b.y) / 2, tx: tx, ty: ty, s: s }
      panStart = null
    }
  })

  stageEl.addEventListener('pointermove', function (ev) {
    if (!(ev.pointerId in pointers)) return
    pointers[ev.pointerId] = stagePoint(ev)
    var ids = Object.keys(pointers)
    if (ids.length >= 2 && pinchStart) {
      var a = pointers[ids[0]], b = pointers[ids[1]]
      var dx = a.x - b.x, dy = a.y - b.y
      var dist = Math.hypot(dx, dy) || 1
      var ns = clampScale(pinchStart.s * (dist / pinchStart.dist))
      var lx = (pinchStart.mx - pinchStart.tx) / pinchStart.s
      var ly = (pinchStart.my - pinchStart.ty) / pinchStart.s
      var mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2
      s = ns; tx = mx - lx * ns; ty = my - ly * ns
      moved = true
      applyTransform()
      return
    }
    if (panStart) {
      var p = pointers[ev.pointerId]
      var ddx = p.x - panStart.px, ddy = p.y - panStart.py
      if (!moved && Math.abs(ddx) + Math.abs(ddy) > MOVE_THRESH) { moved = true; clearHold() }
      if (moved) { tx = panStart.tx + ddx; ty = panStart.ty + ddy; applyTransform() }
    }
  })

  function endPointer(ev) {
    if (!(ev.pointerId in pointers)) return
    var wasSingle = Object.keys(pointers).length === 1
    delete pointers[ev.pointerId]
    try { stageEl.releasePointerCapture(ev.pointerId) } catch (_) {}
    clearHold()
    var ids = Object.keys(pointers)
    if (ids.length === 1) {
      // dropped from a pinch back to one finger → re-anchor the pan to avoid a jump
      pinchStart = null
      panStart = { px: pointers[ids[0]].x, py: pointers[ids[0]].y, tx: tx, ty: ty }
      moved = true
    } else if (ids.length === 0) {
      stageEl.classList.remove('grabbing')
      pinchStart = null; panStart = null
      // a quick, still tap on empty map = dismiss the open marker card
      if (wasSingle && !moved && Date.now() - downTime < 400) { if (cardEl.classList.contains('open')) closeCard() }
    }
  }
  stageEl.addEventListener('pointerup', endPointer)
  stageEl.addEventListener('pointercancel', endPointer)

  stageEl.addEventListener('wheel', function (ev) {
    ev.preventDefault()
    var p = stagePoint(ev)
    var factor = ev.deltaY < 0 ? 1.15 : 1 / 1.15
    zoomTo(s * factor, p.x, p.y)
  }, { passive: false })

  // pin click → open its edit card
  markersEl.addEventListener('click', function (ev) {
    var pin = ev.target.closest && ev.target.closest('.pin')
    if (!pin) return
    ev.stopPropagation()
    openCard(pin.dataset.id)
  })

  // ── marker card wiring ──
  function activeCardMarker() { return cardMarkerId ? markerById(cardMarkerId) : null }
  function bindField(elId, key, isPinName) {
    document.getElementById(elId).addEventListener('input', function (ev) {
      var m = activeCardMarker(); if (!m) return
      m[key] = ev.target.value
      if (isPinName) {
        var el = markersEl.querySelector('.pin[data-id="' + (window.CSS && CSS.escape ? CSS.escape(m.id) : m.id) + '"]')
        if (el) { var lbl = el.querySelector('.pin-label'); if (lbl) lbl.textContent = m.name || '未命名标记'; el.setAttribute('aria-label', m.name || '未命名标记') }
        markLocation(lastLocation)  // renaming may (un)match the current 地点
      }
      persistSoon()
    })
  }
  bindField('mkName', 'name', true)
  bindField('mkGroup', 'group', false)
  bindField('mkDesc', 'desc', false)

  document.getElementById('mkFocus').addEventListener('click', function () { var m = activeCardMarker(); if (m) focusMarker(m, 2) })
  document.getElementById('mkDel').addEventListener('click', function () { cardEl.classList.add('confirm') })
  document.getElementById('mkDelNo').addEventListener('click', function () { cardEl.classList.remove('confirm') })
  document.getElementById('mkDelYes').addEventListener('click', function () {
    var m = activeCardMarker(); if (!m) return
    markers = markers.filter(function (x) { return x.id !== m.id })
    persist()
    closeCard()
    renderMarkers()
  })

  // ── search: Enter focuses the first name/group match ──
  searchEl.addEventListener('keydown', function (ev) {
    if (ev.key !== 'Enter') return
    ev.preventDefault()
    var q = searchEl.value.trim().toLowerCase()
    if (!q) return
    var hit = null
    for (var i = 0; i < markers.length; i++) {
      var m = markers[i]
      if ((m.name && m.name.toLowerCase().indexOf(q) >= 0) || (m.group && m.group.toLowerCase().indexOf(q) >= 0)) { hit = m; break }
    }
    if (hit) { openCard(hit.id); focusMarker(hit, 2) }
  })

  // ── zoom buttons ──
  document.getElementById('zIn').addEventListener('click', function () { zoomTo(s * 1.3, stageW / 2, stageH / 2) })
  document.getElementById('zOut').addEventListener('click', function () { zoomTo(s / 1.3, stageW / 2, stageH / 2) })
  document.getElementById('zReset').addEventListener('click', function () { resetView() })

  // ── close (typeof-guarded overlay API — inert/hide standalone) ──
  function closeOverlaySurface() {
    try { if (window.rptHost && typeof window.rptHost.closeOverlay === 'function') { window.rptHost.closeOverlay(); return } } catch (_) {}
    try { if (typeof closeOverlay === 'function') { closeOverlay(); return } } catch (_) {}
    scrimEl.classList.remove('open')
    setTimeout(function () { scrimEl.style.display = 'none' }, 240)
  }
  document.getElementById('mpClose').addEventListener('click', closeOverlaySurface)
  scrimEl.addEventListener('click', function (ev) { if (ev.target === scrimEl) closeOverlaySurface() })
  document.addEventListener('keydown', function (ev) {
    if (ev.key !== 'Escape') return
    // Esc closes an open marker card first, then the overlay ("Esc closes" either way)
    if (cardEl.classList.contains('open')) { closeCard(); return }
    closeOverlaySurface()
  })

  // keep the layout correct on resize (re-fit + re-anchor)
  var resizeTimer = 0
  window.addEventListener('resize', function () {
    if (resizeTimer) clearTimeout(resizeTimer)
    resizeTimer = setTimeout(function () { resizeTimer = 0; resetView() }, 120)
  })

  // ── initial data + wiring ──
  function loadData() {
    Promise.all([chatKV(), statData()]).then(function (res) {
      var kv = res[0], SD = res[1]
      if (kv && POEM_THEMES.indexOf(kv['poem.theme']) >= 0) applyPoemTheme(kv['poem.theme'])
      // don't clobber an in-progress edit: only re-read markers when no card is open
      if (!cardEl.classList.contains('open')) markers = readStoredMarkers(kv)
      renderMarkers()
      markLocation(currentLocation(SD))
    })
  }

  // open animation on next frame (reduced-motion → the transition is a CSS no-op)
  requestAnimationFrame(function () { scrimEl.classList.add('open') })
  loadMap()
  loadData()

  if (typeof eventOn === 'function') {
    var pending = false
    var onChange = function () { if (pending) return; pending = true; Promise.resolve().then(function () { pending = false; loadData() }) }
    eventOn('mag_variable_updated', onChange)
    eventOn('message_updated', onChange)
    eventOn('poem:theme', function (p) { applyPoemTheme(p && p.id) })
  }
})()
</script>
</body>
</html>
