<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>命定之诗 — WORLD surface</title>
<!--
  命定之诗 — WORLD surface (play-area redesign P3). The right info column for the panel_ui `world` slot
  [9,4,3,8] (below the STAGE band). A scrolling column of 世界 / 同行 / 委托 — the world's live state.
  See docs/design/poem-play-area-redesign.md §1.4, §4.2, §6.

  Data (verified against the real 状态栏 schema,
  FrontEnd-for-destined-journey-TPR-STS/src/data_schema):
    · 世界   → stat_data.世界 { 时间, 地点 }
    · 同行   → present partners: stat_data.关系列表[name] where 在场===true, with 好感度 (-100..100),
               职业/身份, and a 命定契约 mark
    · 委托   → stat_data.任务列表[name] TaskSchema { 状态, 关注度(低/中/高), 进展, 目标, 奖励 }
  (The mock's 记忆 section had no schema backing; 事件/新闻 exist but are out of scope for P3.)

  Reads getVariables().stat_data; re-renders on mag_variable_updated / message_updated; partner
  avatars via window.assetUrl(name,'头像',mood). Opens standalone (mock data) for preview.
  VERIFY rendering + live data in-app (manual-verify).
-->
<style>
  /* Palette + fonts + the 4 themes live in the shared token file. */
  @import url('./poem-themes.css');
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    height: 100vh; overflow: hidden; color: var(--text); background: var(--night);
    font-family: var(--sans); -webkit-font-smoothing: antialiased;
  }
  .world { height: 100vh; overflow-y: auto; padding: 14px 16px 20px; display: flex; flex-direction: column; gap: 18px; }
  .world::-webkit-scrollbar { width: 6px; }
  .world::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

  .sect { font-family: var(--mono); font-size: 11px; letter-spacing: .22em; text-transform: uppercase;
    color: var(--gold-dim); font-weight: 600; display: flex; align-items: center; gap: 8px; margin: 0 0 10px; }
  .sect::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--line), transparent); }
  .empty { color: var(--faint); font-size: 11.5px; font-style: italic; }

  /* 世界 */
  .ws-row { display: flex; justify-content: space-between; align-items: baseline; font-size: 12.5px; padding: 3px 0; }
  .ws-k { color: var(--dim); } .ws-v { color: var(--text); font-family: var(--mono); font-size: 12px; }

  /* 同行 */
  .npc { display: flex; align-items: center; gap: 10px; margin-bottom: 11px; }
  .npc-av {
    width: 34px; height: 34px; border-radius: 50%; flex: 0 0 auto; overflow: hidden;
    font-family: var(--serif); display: flex; align-items: center; justify-content: center; font-size: 14px;
    background: radial-gradient(120% 100% at 35% 25%, #5a3a52, #201622 70%); border: 1px solid var(--line); color: var(--text);
  }
  .npc-av img { width: 100%; height: 100%; object-fit: cover; }
  .npc-main { flex: 1; min-width: 0; }
  .npc-name { font-size: 12.5px; display: flex; align-items: center; gap: 6px; }
  .npc-name .role { color: var(--faint); font-size: 11px; }
  .npc-pact { color: var(--gold); font-size: 11px; font-family: var(--mono); }
  .npc-rel { height: 4px; border-radius: 2px; background: var(--line); margin-top: 6px; overflow: hidden; position: relative; }
  .npc-rel > i { display: block; height: 100%; background: var(--q-mythic); transition: width .35s ease; }
  .npc-aff { font-family: var(--mono); font-size: 11px; color: var(--dim); margin-left: 6px; }

  /* 委托 */
  .quest { padding: 9px 11px; border: 1px solid var(--line-soft); border-radius: 8px; background: var(--sunken); margin-bottom: 9px; border-left: 2px solid var(--gold-dim); }
  .quest.hi { border-left-color: var(--ember); }
  .quest.lo { border-left-color: var(--line); }
  .quest-h { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
  .quest-t { font-size: 12.5px; color: var(--text); }
  .quest-focus { font-family: var(--mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--gold-dim); flex: 0 0 auto; }
  .quest.hi .quest-focus { color: var(--ember); }
  .quest-goal { font-size: 11px; color: var(--dim); margin-top: 4px; line-height: 1.5; }
  .quest-meta { font-size: 11px; color: var(--faint); margin-top: 5px; display: flex; gap: 10px; flex-wrap: wrap; }
  .quest-meta b { color: var(--gold-dim); font-weight: 500; }
  @media (prefers-reduced-motion: reduce) { .npc-rel > i { transition: none; } }
</style>
</head>
<body>
  <div class="world" id="world">
    <div><div class="sect">世界</div><div id="wWorld"></div></div>
    <div><div class="sect">同行</div><div id="wParty"></div></div>
    <div><div class="sect">委托</div><div id="wQuests"></div></div>
  </div>

<script>
;(function () {
  'use strict'

  // ── play-area theme (4 palettes in poem-themes.css; SELF owns the switcher, we follow) ──
  var POEM_THEMES = ['dusk', 'frost', 'ember', 'verdant']
  function poemTheme() {
    try {
      if (typeof getVariables === 'function') {
        var kv = getVariables({ type: 'chat' })
        if (kv && typeof kv.then !== 'function' && POEM_THEMES.indexOf(kv['poem.theme']) >= 0) return kv['poem.theme']
      }
    } catch (_) {}
    try {
      var u = new URLSearchParams(location.search).get('theme')
      if (POEM_THEMES.indexOf(u) >= 0) return u
      var ls = localStorage.getItem('poem.theme')
      if (POEM_THEMES.indexOf(ls) >= 0) return ls
    } catch (_) {}
    return 'dusk'
  }
  function applyPoemTheme(id) {
    document.documentElement.dataset.poemTheme = POEM_THEMES.indexOf(id) >= 0 ? id : 'dusk'
  }
  applyPoemTheme(poemTheme())

  var MOCK = {
    世界: { 时间: '暮 · 戌时', 地点: '艾瑟嘉德' },
    关系列表: {
      薇拉: { 在场: true, 职业: ['灰隐者'], 好感度: 64, 命定契约: true },
      恩里克: { 在场: true, 职业: ['见习骑士'], 好感度: 38, 命定契约: false },
      赛琳: { 在场: false, 职业: ['吟游诗人'], 好感度: 20 }
    },
    任务列表: {
      灰烬中的信使: { 状态: '进行中', 关注度: '高', 目标: '在宵禁前将薇拉的口信送抵北门守卫。', 进展: '已离开酒馆', 奖励: '声望 +10' },
      占卜师的低语: { 状态: '待接取', 关注度: '中', 目标: '找到拒收钱币的占卜师，问明「黄昏属于你」之意。', 奖励: '命运点数 +1' }
    }
  }

  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c] }) }
  var num = function (v, d) { var n = Number(v); return isFinite(n) ? n : (d == null ? 0 : d) }
  var firstStr = function (a) { return Array.isArray(a) ? a.filter(Boolean).join(' · ') : (a || '') }

  // 好感度 is -100..100; map to a 0..100 bar width
  function affPct(v) { return Math.max(0, Math.min(100, (num(v) + 100) / 2)) }

  function worldState(SD) {
    SD = SD && typeof SD === 'object' ? SD : {}
    var w = SD['世界'] && typeof SD['世界'] === 'object' ? SD['世界'] : {}
    var rel = SD['关系列表'] && typeof SD['关系列表'] === 'object' ? SD['关系列表'] : {}
    var tasks = SD['任务列表'] && typeof SD['任务列表'] === 'object' ? SD['任务列表'] : {}
    var party = Object.keys(rel)
      .filter(function (n) { return rel[n] && rel[n]['在场'] === true })
      .map(function (n) {
        var p = rel[n]
        return {
          name: n, role: firstStr(p['职业']) || firstStr(p['身份']),
          aff: p['好感度'] != null ? num(p['好感度']) : null, pact: !!p['命定契约'],
          mood: p['当前情绪'] || p['心情'] || undefined
        }
      })
    var quests = Object.keys(tasks).map(function (name) {
      var q = tasks[name] || {}
      return { name: name, status: q['状态'] || '', focus: q['关注度'] || '中', goal: q['目标'] || q['详情'] || '', progress: q['进展'] || '', reward: q['奖励'] || '' }
    })
    return { world: { time: w['时间'] || '', location: w['地点'] || '' }, party: party, quests: quests }
  }

  function renderWorld(s) {
    var rows = []
    if (s.world.time) rows.push({ k: '时辰', v: s.world.time })
    if (s.world.location) rows.push({ k: '地点', v: s.world.location })
    document.getElementById('wWorld').innerHTML = rows.length
      ? rows.map(function (r) { return '<div class="ws-row"><span class="ws-k">' + esc(r.k) + '</span><span class="ws-v">' + esc(r.v) + '</span></div>' }).join('')
      : '<div class="empty">未知</div>'

    document.getElementById('wParty').innerHTML = s.party.length
      ? s.party.map(function (m, i) {
          return '<div class="npc" data-i="' + i + '">' +
            '<span class="npc-av" data-name="' + esc(m.name) + '">' + esc(String(m.name || '?').charAt(0)) + '</span>' +
            '<span class="npc-main"><div class="npc-name">' + esc(m.name) +
            (m.role ? '<span class="role">' + esc(m.role) + '</span>' : '') +
            (m.pact ? '<span class="npc-pact">◈ 命定</span>' : '') +
            (m.aff != null ? '<span class="npc-aff">' + m.aff + '</span>' : '') + '</div>' +
            (m.aff != null ? '<div class="npc-rel"><i style="width:' + affPct(m.aff) + '%"></i></div>' : '') +
            '</span></div>'
        }).join('')
      : '<div class="empty">此刻无人同行</div>'
    loadAvatars(s.party)

    document.getElementById('wQuests').innerHTML = s.quests.length
      ? s.quests.map(function (q) {
          var cls = q.focus === '高' ? ' hi' : q.focus === '低' ? ' lo' : ''
          var meta = []
          if (q.status) meta.push('<b>状态</b> ' + esc(q.status))
          if (q.progress) meta.push('<b>进展</b> ' + esc(q.progress))
          if (q.reward) meta.push('<b>奖励</b> ' + esc(q.reward))
          return '<div class="quest' + cls + '"><div class="quest-h"><span class="quest-t">' + esc(q.name) +
            '</span><span class="quest-focus">' + esc(q.focus) + '</span></div>' +
            (q.goal ? '<div class="quest-goal">' + esc(q.goal) + '</div>' : '') +
            (meta.length ? '<div class="quest-meta">' + meta.join('<span></span>') + '</div>' : '') + '</div>'
        }).join('')
      : '<div class="empty">暂无委托</div>'
  }

  function loadAvatars(party) {
    if (typeof window.assetUrl !== 'function') return
    party.forEach(function (m) {
      try {
        Promise.resolve(window.assetUrl(m.name, '头像', m.mood)).then(function (url) {
          if (!url) return
          var el = document.querySelector('.npc-av[data-name="' + (window.CSS && CSS.escape ? CSS.escape(m.name) : m.name) + '"]')
          if (!el) return
          var img = document.createElement('img'); img.alt = m.name; img.src = url
          img.onload = function () { el.textContent = ''; el.appendChild(img) }
        })
      } catch (_) {}
    })
  }

  function statData() {
    try {
      if (typeof getVariables !== 'function') return Promise.resolve(MOCK)
      var v = getVariables()
      if (v && typeof v.then === 'function') return v.then(function (r) { return (r || {}).stat_data || {} })
      return Promise.resolve((v || {}).stat_data || {})
    } catch (_) { return Promise.resolve(MOCK) }
  }

  function render() { statData().then(function (SD) { renderWorld(worldState(SD)) }) }

  render()
  if (typeof eventOn === 'function') {
    var pending = false
    var refresh = function () { if (pending) return; pending = true; Promise.resolve().then(function () { pending = false; render() }) }
    eventOn('mag_variable_updated', refresh)
    eventOn('message_updated', refresh)
    eventOn('poem:theme', function (p) { applyPoemTheme(p && p.id) })
  }
})()
</script>
</body>
</html>
