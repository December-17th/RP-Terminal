<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>命定之诗 — WORLD surface</title>
<!--
  命定之诗 — WORLD surface (play-area redesign P3 + PM-B8 rev 2 + PM-G2 restructure). The right info
  column for the panel_ui `world` slot [9,0,3,12] (full play-area height). PM-G2 rebuilds it per
  docs/design/poem-status-parity-design-2026-07-07.md §2:
    · a PINNED 世界 card on top (时辰 / 地点 rows + a 地图 glyph button), never scrolls away;
    · a gilt tab row 命定 / 委托 / 新闻 (SELF's .tab idiom; default 命定, active tab persisted to
      localStorage 'poem.worldTab');
    · the active tab fills the remaining height and scrolls INSIDE.

  Data (verified against the real 状态栏 schema,
  FrontEnd-for-destined-journey-TPR-STS/src/data_schema + the reference pages/{destiny,quests,news}):
    · 世界 → stat_data.世界 { 时间, 地点 }
    · 命定 → ALL of stat_data.关系列表[name] (RelationSchema): 好感度(-100..100), 职业/身份,
             命定契约, 在场. Filter pills 全部/在场/离场/缔约 (DestinyTab.tsx:78-87 idiom; default 在场).
             A row → writes chat KV poem.sheet={partner} + rptHost.requestOverlay('poem-partner') (§3).
    · 委托 → stat_data.任务列表[name] TaskSchema { 状态, 关注度(高/中/低), 进展, 详情, 目标, 奖励 }
             (QuestsTab.tsx:20-27). Status filter pills; a card taps open to the full field breakdown.
    · 新闻 → stat_data.新闻[category][title] = prose (NewsTab.tsx:9-58). 3 fixed categories flattened
             into a feed; empty strings skipped; per-category accent.

  Reads getVariables().stat_data; re-renders on mag_variable_updated / message_updated; partner avatars
  via window.assetUrl(name,'头像',mood). Overlay opens are typeof-guarded on window.rptHost.requestOverlay
  (PM-A7) so this page still opens standalone (mock data) in a browser. VERIFY live data in-app.

  CONTRAST (poem-themes.css header): text ≤12px stays on the SAFE token list (--gold/--text/--dim/--faint)
  in all 4 palettes; CJK-bearing text ≥12px (numeric/mono runs may stay 11px). Accents (border-left,
  badge tint) use --gold/--ember/--mp via color-mix and never carry small text alone.
-->
<style>
  /* Palette + fonts + the 4 themes live in the shared token file. */
  @import url('./poem-themes.css');
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    height: 100vh; overflow: hidden; color: var(--text); background: var(--night);
    font-family: var(--sans); -webkit-font-smoothing: antialiased;
  }

  /* PM-G2: the column no longer scrolls as a whole — it is a flex stack of pinned card + tab row + a
     single scrolling body, so 世界 + the tabs stay put while only the active tab content scrolls. */
  .world { height: 100vh; overflow: hidden; padding: 14px 14px 14px; display: flex; flex-direction: column; gap: 8px; }

  /* night-glass card (v4 mock .card) — the pinned 世界 card + tab panels reuse it */
  .wcard { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--line-soft); border-radius: 12px; padding: 12px 14px; }
  .wworld { flex: 0 0 auto; }

  .sect { font-family: var(--mono); font-size: 12px; letter-spacing: .22em; text-transform: uppercase;
    color: var(--gold); font-weight: 600; display: flex; align-items: center; gap: 8px; margin: 0 0 10px; }  /* PM-B3: --gold ≥7.2:1. PM-B5: CJK header 世界 → ≥12px */
  .sect::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--line), transparent); }
  .empty { color: var(--faint); font-size: 12px; font-style: italic; }  /* PM-B5: CJK empty-state prose → ≥12px */

  /* pinned 世界 card header — 世界 title + a 地图 glyph button at the row end (§2/§4) */
  .ws-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .ws-head .sect { flex: 1; margin: 0; }
  .map-btn {
    flex: 0 0 auto; width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center;
    background: var(--glass-soft); border: 1px solid var(--line-soft); border-radius: 8px; color: var(--gold);
    cursor: pointer; padding: 0; transition: border-color .12s ease, color .12s ease;
  }
  .map-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
  .map-btn svg { width: 16px; height: 16px; display: block; }

  /* 世界 rows */
  .ws-row { display: flex; justify-content: space-between; align-items: baseline; font-size: 12.5px; padding: 3px 0; }
  .ws-k { color: var(--dim); } .ws-v { color: var(--text); font-family: var(--mono); font-size: 12px; }

  /* ── tab row (SELF .tab idiom: glass-soft pills; active = gilt border + gold text) ── */
  .wtabs { flex: 0 0 auto; display: flex; align-items: center; gap: 6px; }
  .tab { flex: 1; font-family: var(--mono); font-size: 12px; letter-spacing: .04em;  /* PM-B5: CJK tab labels (命定/委托/新闻) → ≥12px */
    background: var(--glass-soft); backdrop-filter: blur(12px); border: 1px solid var(--line-soft);
    color: var(--dim); padding: 8px 4px; border-radius: 10px; cursor: pointer; }
  .tab:hover { color: var(--text); border-color: var(--line); }
  .tab.active { color: var(--gold); border-color: var(--gold-dim); }

  /* ── tab body: the ONLY scroller; the active panel fills it ── */
  .wbody { flex: 1 1 auto; min-height: 0; overflow-y: auto; }
  .wbody::-webkit-scrollbar { width: 6px; }
  .wbody::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
  .wpanel { display: none; }
  .world[data-tab="destiny"] .wpanel[data-tab="destiny"],
  .world[data-tab="quests"] .wpanel[data-tab="quests"],
  .world[data-tab="news"] .wpanel[data-tab="news"] { display: block; }

  /* ── filter pill row (命定 categories + 委托 status) ── */
  .pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 11px; }
  .pill { display: inline-flex; align-items: center; gap: 5px; font-size: 12px;  /* PM-B5: CJK pill labels (全部/在场/离场/缔约 …) → ≥12px */
    background: var(--glass-soft); border: 1px solid var(--line-soft); color: var(--dim);
    padding: 4px 9px; border-radius: 999px; cursor: pointer; font-family: inherit; }
  .pill:hover { color: var(--text); border-color: var(--line); }
  .pill.on { color: var(--gold); border-color: var(--gold-dim); }
  .pill .n { font-family: var(--mono); font-size: 11px; color: var(--faint); }  /* PM-B5: numeric count — stays mono */
  .pill.on .n { color: var(--gold); }

  /* ── 命定: partner rows (today's .npc glance, now a tappable button opening the sheet) ── */
  .npc { display: flex; align-items: center; gap: 10px; width: 100%; margin-bottom: 4px; padding: 6px 6px; border-radius: 8px;
    background: none; border: 1px solid transparent; color: inherit; text-align: left; font: inherit; cursor: pointer; }
  .npc:hover { border-color: var(--line-soft); background: color-mix(in srgb, var(--text) 6%, transparent); }
  .npc-av {
    width: 34px; height: 34px; border-radius: 50%; flex: 0 0 auto; overflow: hidden;
    font-family: var(--serif); display: flex; align-items: center; justify-content: center; font-size: 14px;
    background: radial-gradient(120% 100% at 35% 25%, var(--scene-b), var(--sunken) 70%); border: 1px solid var(--line); color: var(--text);
  }
  .npc-av img { width: 100%; height: 100%; object-fit: cover; }
  .npc-main { flex: 1; min-width: 0; }
  .npc-name { font-size: 12.5px; display: flex; align-items: center; gap: 6px; }
  .npc-name .role { color: var(--faint); font-size: 12px; }  /* PM-B5: CJK 职业/身份 (灰隐者 …) → ≥12px */
  .npc-pact { color: var(--gold); font-size: 12px; font-family: var(--mono); }  /* PM-B5: ◈ 命定 CJK → ≥12px */
  /* 好感度 center-axis bar: center tick at 50%; positive fills rightward, negative leftward in --ember. */
  .npc-rel { height: 4px; border-radius: 2px; background: rgba(0, 0, 0, .45); margin-top: 6px; overflow: hidden; position: relative; }
  .npc-rel::before { content: ''; position: absolute; left: 50%; top: -1px; bottom: -1px; width: 1px; background: var(--line); }
  .npc-rel > i { position: absolute; top: 0; bottom: 0; background: var(--q-mythic); transition: width .35s ease; }
  .npc-rel > i.pos { left: 50%; }
  .npc-rel > i.neg { right: 50%; background: var(--ember); }
  .npc-aff { font-family: var(--mono); font-size: 11px; color: var(--dim); margin-left: 6px; }  /* PM-B5: numeric 好感度 (64, -46) — stays mono */

  /* ── 委托: quest cards (focus coloring; tap → in-place full-field expand) ── */
  .quest { padding: 9px 11px; border: 1px solid var(--line-soft); border-radius: 9px; background: rgba(0, 0, 0, .30); margin-bottom: 8px; border-left: 2px solid var(--gold-dim); cursor: pointer; }
  .quest.hi { border-left-color: var(--ember); }
  .quest.lo { border-left-color: var(--line); }
  .quest-h { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
  .quest-t { font-size: 12.5px; color: var(--text); }
  .quest-focus { font-family: var(--mono); font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--gold); flex: 0 0 auto; }  /* PM-B3: --gold ≥6.9:1. PM-B5: CJK 关注度 (高/中/低) → ≥12px */
  .quest.hi .quest-focus { color: var(--ember); }
  .quest-goal { font-size: 12px; color: var(--dim); margin-top: 4px; line-height: 1.5; }  /* PM-B5: CJK 目标 prose → ≥12px */
  .quest-detail { font-size: 12px; color: var(--faint); margin-top: 4px; line-height: 1.5; }  /* PM-B5: CJK 详情 prose → ≥12px. Own paragraph — no longer a 目标 fallback. */
  .quest-meta { font-size: 12px; color: var(--faint); margin-top: 5px; display: flex; gap: 10px; flex-wrap: wrap; }  /* PM-B5: CJK 状态/进展/奖励 → ≥12px */
  .quest-meta b { color: var(--dim); font-weight: 500; }  /* PM-B3: --dim ≥7.4:1 muted label (not a gilt accent) */
  /* accordion: full 目标/详情/进展/奖励, 200ms max-height cadence (one open at a time) */
  .quest-full { max-height: 0; overflow: hidden; opacity: 0; transition: max-height .2s ease, opacity .2s ease; }
  .quest.open .quest-full { max-height: 900px; opacity: 1; margin-top: 6px; }
  .qf-row { padding: 5px 0; border-top: 1px solid var(--line-soft); }
  .qf-row:first-child { border-top: none; }
  .qf-k { display: block; font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--gold); margin-bottom: 2px; }  /* PM-B3: --gold ≥7.2:1. numeric/mono label. */
  .qf-v { font-size: 12px; color: var(--text); line-height: 1.55; white-space: pre-wrap; }  /* PM-B5: CJK field prose → ≥12px */

  /* ── 新闻: feed of glass cards with per-category accent (border-left + badge tint) ── */
  .news { padding: 9px 11px; border: 1px solid var(--line-soft); border-radius: 9px; background: rgba(0, 0, 0, .30); margin-bottom: 8px; border-left: 2px solid var(--gold); }
  .news-badge { display: inline-flex; align-items: center; font-size: 12px; color: var(--text); padding: 2px 9px; border-radius: 999px; border: 1px solid var(--line-soft); }  /* PM-B5: CJK category names (阿斯塔利亚快讯 …) → ≥12px; accent rides the tint/border, text stays --text (SAFE) */
  .news-t { font-size: 12.5px; color: var(--text); margin-top: 6px; }
  .news-p { font-size: 12px; color: var(--dim); margin-top: 4px; line-height: 1.55; white-space: pre-wrap; }  /* PM-B5: CJK news prose → ≥12px */

  @media (prefers-reduced-motion: reduce) { .npc-rel > i, .quest-full { transition: none; } }

  /* ══ edit mode (PM-G4, design §6) — inline-editor chrome + delete-confirm modal (WORLD follows the
        toggle SELF owns). ≤12px text stays on SAFE tokens; CJK ≥12px; hit targets ≥32px. ══ */
  [data-edit-on] .ed { border-bottom: 1px dotted var(--gold-dim); cursor: text; }
  .ed-x { flex: 0 0 auto; display: none; width: 22px; height: 22px; line-height: 20px; text-align: center; padding: 0;
    margin-left: 6px; border-radius: 6px; border: 1px solid var(--line-soft); background: var(--glass-soft);
    color: var(--ember); font-size: 12px; cursor: pointer; vertical-align: middle; }
  [data-edit-on] .ed-x { display: inline-block; }
  .ed-x:hover { border-color: var(--ember); background: color-mix(in srgb, var(--ember) 16%, transparent); }
  .ed-in { font: inherit; font-size: 13px; color: var(--text); background: var(--glass-soft);
    border: 1px solid var(--line-soft); border-radius: 6px; padding: 4px 6px; min-width: 56px; }
  .ed-in:focus { outline: none; border-color: var(--gold-dim); box-shadow: 0 0 0 2px var(--gold-dim); }
  textarea.ed-in { width: 100%; resize: none; max-height: 40vh; line-height: 1.55; font-family: var(--serif); }
  select.ed-in { -webkit-appearance: none; appearance: none; padding-right: 22px; cursor: pointer; }
  .ed-num { display: inline-flex; align-items: center; gap: 4px; }
  .ed-num .ed-in { width: 68px; min-width: 0; text-align: center; }
  .ed-step { width: 28px; height: 30px; flex: 0 0 auto; border-radius: 6px; padding: 0; cursor: pointer;
    background: var(--glass-soft); border: 1px solid var(--line-soft); color: var(--gold); font-size: 16px; line-height: 1; }
  .ed-step:hover { border-color: var(--gold-dim); }
  .ed-tags { display: inline-flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  .ed-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; padding: 2px 8px; border-radius: 999px;
    border: 1px solid var(--line); color: var(--dim); }
  .ed-tag button { background: none; border: none; color: var(--ember); cursor: pointer; font-size: 13px; line-height: 1; padding: 0; }
  .ed-modal-scrim { position: fixed; inset: 0; z-index: 60; display: none; align-items: center; justify-content: center;
    padding: 24px; background: rgba(0, 0, 0, .55); backdrop-filter: blur(5px); }
  .ed-modal-scrim.open { display: flex; }
  .ed-modal { width: min(340px, 90vw); padding: 18px; border-radius: 14px;
    background: var(--glass); backdrop-filter: blur(14px); border: 1px solid var(--line-soft); box-shadow: 0 20px 56px rgba(0, 0, 0, .5); }
  .ed-modal-t { font-family: var(--mono); font-size: 12px; letter-spacing: .18em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
  .ed-modal-msg { font-size: 13px; color: var(--text); line-height: 1.6; margin-bottom: 16px; }
  .ed-modal-msg b { color: var(--ember); font-weight: 700; }
  .ed-modal-row { display: flex; justify-content: flex-end; gap: 8px; }
  .ed-btn { font: inherit; font-size: 13px; padding: 7px 15px; border-radius: 8px; cursor: pointer;
    background: var(--glass-soft); border: 1px solid var(--line-soft); color: var(--dim); }
  .ed-btn:hover { color: var(--text); border-color: var(--line); }
  .ed-btn:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--gold-dim); }
  .ed-btn.danger { color: var(--ember); border-color: var(--ember); background: color-mix(in srgb, var(--ember) 20%, transparent); }
  .ed-btn.danger:hover { background: color-mix(in srgb, var(--ember) 30%, transparent); }
  @media (prefers-reduced-motion: reduce) { .ed-in, .ed-step, .ed-btn { transition: none; } }
</style>
</head>
<body>
  <div class="world" id="world">
    <div class="wcard wworld">
      <div class="ws-head">
        <div class="sect">世界</div>
        <button class="map-btn" data-act="map" type="button" title="地图" aria-label="地图">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="9"></circle>
            <polygon points="15.5 8.5 10.5 10.5 8.5 15.5 13.5 13.5"></polygon>
          </svg>
        </button>
      </div>
      <div id="wWorld"></div>
    </div>

    <div class="wtabs" id="wtabs">
      <button class="tab" data-tab="destiny" type="button">命定</button>
      <button class="tab" data-tab="quests" type="button">委托</button>
      <button class="tab" data-tab="news" type="button">新闻</button>
    </div>

    <div class="wbody" id="wbody">
      <div class="wpanel" data-tab="destiny" id="pDestiny"></div>
      <div class="wpanel" data-tab="quests" id="pQuests"></div>
      <div class="wpanel" data-tab="news" id="pNews"></div>
    </div>
  </div>

<script>
;(function () {
  'use strict'

  // ── play-area theme (4 palettes in poem-themes.css; SELF owns the switcher, we follow) ──
  var POEM_THEMES = ['dusk', 'frost', 'ember', 'verdant']
  function poemTheme() {
    try {
      if (typeof getVariables === 'function') {
        var kv = getVariables({ type: 'chat' })
        if (kv && typeof kv.then !== 'function' && POEM_THEMES.indexOf(kv['poem.theme']) >= 0) return kv['poem.theme']
      }
    } catch (_) {}
    try {
      var u = new URLSearchParams(location.search).get('theme')
      if (POEM_THEMES.indexOf(u) >= 0) return u
      var ls = localStorage.getItem('poem.theme')
      if (POEM_THEMES.indexOf(ls) >= 0) return ls
    } catch (_) {}
    return 'dusk'
  }
  function applyPoemTheme(id) {
    document.documentElement.dataset.poemTheme = POEM_THEMES.indexOf(id) >= 0 ? id : 'dusk'
  }
  applyPoemTheme(poemTheme())

  // ── standalone-preview fallback (only used when getVariables is absent) ──
  var MOCK = {
    世界: { 时间: '暮 · 戌时', 地点: '艾瑟嘉德' },
    关系列表: {
      薇拉: { 在场: true, 职业: ['灰隐者'], 好感度: 64, 命定契约: true },
      恩里克: { 在场: true, 职业: ['见习骑士'], 好感度: 38, 命定契约: false },
      赛琳: { 在场: true, 职业: ['吟游诗人'], 好感度: -46, 命定契约: false },
      渡鸦: { 在场: false, 身份: ['密探'], 好感度: 0, 命定契约: false },
      伊索德: { 在场: false, 职业: ['占卜师'], 好感度: 22, 命定契约: true }
    },
    任务列表: {
      灰烬中的信使: { 状态: '进行中', 关注度: '高', 目标: '在宵禁前将薇拉的口信送抵北门守卫。', 详情: '口信以密语写就，只有北门老兵能解读；沿途须避开巡夜的教团骑士。', 进展: '已离开酒馆', 奖励: '声望 +10' },
      占卜师的低语: { 状态: '待接取', 关注度: '中', 目标: '找到拒收钱币的占卜师，问明「黄昏属于你」之意。', 详情: '占卜师近日常现身午后茶会，却从不久留。', 奖励: '命运点数 +1' }
    },
    新闻: {
      阿斯塔利亚快讯: {
        北门戒严: '教团于日暮时分封锁北门，盘查往来信使，商队被迫绕行西桥。',
        赤月将至: '观星台称今夜将有赤月，占卜师们彻夜未眠。'
      },
      酒馆留言板: {
        悬赏灰隐者: '有人在醉樽酒馆张贴悬赏，寻一名披灰袍的隐者，酬金从优。'
      },
      午后茶会: {
        茶桌传闻: '午后茶会上，贵妇们低声议论着某位骑士与吟游诗人的往来。'
      }
    }
  }

  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c] }) }
  var num = function (v, d) { var n = Number(v); return isFinite(n) ? n : (d == null ? 0 : d) }
  var firstStr = function (a) { return Array.isArray(a) ? a.filter(Boolean).join(' · ') : (a || '') }

  // ── edit-layer value helpers (PM-G4). edA → data-* descriptor for an editable VALUE (path = SEGMENT
  //   ARRAY, never dot-split); edSpan wraps an inline value; edx → a delete ✕. Inert unless edit is on. ──
  function edA(kind, segs, opts) {
    opts = opts || {}
    var a = ' data-ed="' + kind + '" data-path="' + esc(JSON.stringify(segs)) + '"'
    if (opts.min != null) a += ' data-min="' + opts.min + '"'
    if (opts.max != null) a += ' data-max="' + opts.max + '"'
    if (opts.round) a += ' data-round="1"'
    if (opts.opts) a += ' data-opts="' + esc(JSON.stringify(opts.opts)) + '"'
    var cur = opts.cur
    a += ' data-cur="' + esc(cur == null ? '' : (typeof cur === 'object' ? JSON.stringify(cur) : String(cur))) + '"'
    return a
  }
  function edSpan(disp, kind, segs, opts) { return '<span class="ed"' + edA(kind, segs, opts) + '>' + disp + '</span>' }
  function edx(segs, name) { return '<button type="button" class="ed-x" data-del="' + esc(JSON.stringify(segs)) + '" data-name="' + esc(name == null ? '' : name) + '" title="删除" aria-label="删除">✕</button>' }

  // 好感度 is -100..100; the bar is a center-axis meter (0 = empty at the tick). Returns { pct, neg }.
  function affFill(v) {
    var n = Math.max(-100, Math.min(100, num(v)))
    return { pct: Math.abs(n) / 2, neg: n < 0 }
  }

  // 命定 category pills (DestinyTab.tsx:78-87 idiom; labels per issue: 全部/在场/离场/缔约; default 在场)
  var DESTINY_FILTERS = [

    var ed = ev.target.closest && ev.target.closest('.ed')
    if (ed && EDIT_ROOT.contains(ed) && !ed.getAttribute('data-ed-live')) { ev.preventDefault(); ev.stopPropagation(); openEditor(ed) }
  }, true)
  editOn = readEditKV(); applyEditAffordance()

  render()
  if (typeof eventOn === 'function') {
    var pending = false
    var refresh = function () { if (pending) return; pending = true; Promise.resolve().then(function () { pending = false; render() }) }
    eventOn('mag_variable_updated', refresh)
    eventOn('message_updated', refresh)
    eventOn('poem:theme', function (p) { applyPoemTheme(p && p.id) })
    eventOn('poem:edit', function (p) { editOn = !!(p && p.on); applyEditAffordance(); render() })
  }
})()
</script>
</body>
</html>
